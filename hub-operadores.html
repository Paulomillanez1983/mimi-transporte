<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MIMI Operadores</title>
  <meta name="description" content="Acceso para choferes y prestadores MIMI.">
  <link rel="icon" href="./favicon.ico">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: white;
    }

    .wrap {
      width: min(920px, 100%);
      text-align: center;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      margin: 0 0 10px;
    }

    p {
      color: #cbd5e1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      padding: 28px;
      border-radius: 26px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 20px 60px rgba(0,0,0,.28);
      text-align: left;
    }

    .card h2 {
      margin: 0 0 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 800;
    }

    .transport {
      background: #7cc7ff;
      color: #062033;
    }

    .services {
      background: #4ade80;
      color: #052e16;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>MIMI Operadores</h1>
    <p>Elegí cómo querés trabajar en la plataforma.</p>

    <div class="grid">
      <section class="card">
        <h2>Chofer MIMI Transporte</h2>
        <p>Acceso para conductores de viajes y transporte escolar.</p>
        <a class="btn transport" href="./login-chofer.html">Entrar como chofer</a>
      </section>

      <section class="card">
        <h2>Prestador MIMI Servicios</h2>
        <p>Acceso para proveedores de servicios.</p>
        <a class="btn services" href="./mimi-servicios/prestador.html">Entrar como prestador</a>
      </section>
    </div>
  </main>
</body>
</html>
