<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>MIMI Driver - Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- LIB SUPABASE LOCAL -->
  <script src="./libs/supabase-js.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; text-align: center; }
    .subtitle { color: rgba(255,255,255,0.6); margin-bottom: 30px; text-align: center; }
    .login-form { width: 100%; max-width: 320px; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 16px;
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 16px;
    }
    input:focus { outline: none; border-color: #276EF1; }
    button {
      width: 100%;
      padding: 18px;
      background: #276EF1;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #448AFF; }
    .google-btn { margin-top: 12px; background: #fff; color: #000; font-weight: 800; }
    .error { color: #E11900; font-size: 14px; margin-top: 12px; text-align: center; display: none; }
    .error.visible { display: block; }
    .ok { color: #22c55e; font-size: 14px; margin-top: 12px; text-align: center; display: none; }
    .ok.visible { display: block; }
  </style>
</head>

<body>
  <div class="logo">🚐</div>
  <h1>MIMI Driver</h1>
  <p class="subtitle">Ingresá tus credenciales</p>

  <form class="login-form" id="loginForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="username">
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" required autocomplete="current-password">
    </div>

    <button type="submit">Ingresar</button>

    <button type="button" class="google-btn" id="googleLoginBtn">
      Continuar con Google
    </button>

    <div class="error" id="error"></div>
    <div class="ok" id="ok"></div>
  </form>

  <!-- LOGIN CONTROLADO (UN SOLO CLIENT) -->
  <script type="module">
    import supabaseService from "./js/supabase-client.js";
    import CONFIG from "./js/config.js";

    const errorEl = document.getElementById("error");
    const okEl = document.getElementById("ok");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add("visible");
      okEl.classList.remove("visible");
    }

    function showOk(msg) {
      okEl.textContent = msg;
      okEl.classList.add("visible");
      errorEl.classList.remove("visible");
    }

    async function checkSession() {
      await supabaseService.init();
      const { data } = await supabaseService.client.auth.getSession();

      if (data?.session) {
        window.location.replace("chofer-panel.html");
      }
    }

    checkSession();

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      await supabaseService.init();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      showOk("Ingresando...");

      const { error } = await supabaseService.client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showError("❌ " + error.message);
        return;
      }

      showOk("✅ Login correcto...");
      window.location.replace("chofer-panel.html");
    });

    document.getElementById("googleLoginBtn").addEventListener("click", async () => {
      await supabaseService.init();

      showOk("Abriendo Google...");

      const { error } = await supabaseService.client.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: "https://paulomillanez1983.github.io/mimi-transporte/chofer-panel.html"
        }
      });

      if (error) {
        showError("❌ Error Google: " + error.message);
      }
    });
  </script>

</body>
</html>
