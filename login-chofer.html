<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MIMI - Login Chofer</title>
  <meta name="theme-color" content="#1a1a2e" />

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --azul-oscuro: #1a1a2e;
      --azul-sec: #16213e;
      --azul: #1565c0;
      --naranja: #ff9800;
      --gris: #f5f7fa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--azul-oscuro), var(--azul-sec));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo h1 {
      font-size: 2rem;
      color: var(--azul-oscuro);
      font-weight: 900;
    }

    .logo p {
      color: #666;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #222;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #ddd;
      border-radius: 14px;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--azul);
      box-shadow: 0 0 0 4px rgba(21,101,192,0.08);
    }

    .btn-login {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px;
      background: linear-gradient(135deg, var(--naranja), #f57c00);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-login:active {
      transform: scale(0.99);
    }

    .btn-google {
      width: 100%;
      border: 2px solid #ddd;
      border-radius: 16px;
      padding: 14px;
      background: white;
      color: #444;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .btn-google:hover {
      background: #f8f9fa;
      border-color: #ccc;
    }

    .btn-google img {
      width: 20px;
      height: 20px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: #888;
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .divider span {
      padding: 0 15px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: var(--azul);
      text-decoration: none;
      font-weight: 700;
    }

    .error-msg {
      background: #ffebee;
      color: #c62828;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--azul);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>🚐 MIMI</h1>
      <p>Ingreso Chofer</p>
    </div>

    <div class="loading" id="loading">Iniciando sesión...</div>
    <div class="error-msg" id="errorMsg"></div>

    <!-- Login con Google -->
    <button type="button" class="btn-google" onclick="loginConGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>

    <div class="divider">
      <span>o</span>
    </div>

    <!-- Login tradicional -->
    <form onsubmit="loginChofer(event)">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Ingresá tu usuario" required />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresá tu contraseña" required />
      </div>

      <button type="submit" class="btn-login">Ingresar</button>
    </form>

    <a class="back-link" href="chofer-panel.html">← Volver</a>
  </div>

  <script>
    // 🔷 CONFIGURACIÓN SUPABASE
    const SUPABASE_URL = 'https://xrphpqmutvadjrucqicn.supabase.co';
    const SUPABASE_KEY = "sb_publishable_ZoEziWmg0PUy2lNVsiw1XA_zO40DAoq";
// Inicializar Supabase
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

// Detecta automáticamente la URL actual (localhost o GitHub Pages)
function getRedirectURL() {
  return `${window.location.origin}${window.location.pathname}`;
}

// Guardar datos de sesión del chofer
function persistirChofer(user) {
  localStorage.setItem('choferLogueado', 'true');
  localStorage.setItem('choferUsuario', user.email || '');
  localStorage.setItem('choferNombre', user.user_metadata?.full_name || user.email || '');
  localStorage.setItem('choferFoto', user.user_metadata?.avatar_url || '');
  localStorage.setItem('choferId', user.id || '');
  localStorage.setItem('choferAuthProvider', 'google');
}

// ========== MANEJAR SESIÓN AL CARGAR ==========
async function initAuth() {
  try {
    const loadingEl = document.getElementById('loading');

    const hash = window.location.hash || '';
    const search = window.location.search || '';
    const vieneDeOAuth =
      hash.includes('access_token') ||
      hash.includes('refresh_token') ||
      search.includes('code=');

    if (vieneDeOAuth && loadingEl) {
      loadingEl.style.display = 'block';
    }

    // IMPORTANTE:
    // Esto permite que Supabase procese correctamente el callback OAuth
    const {
      data: { session },
      error
    } = await supabaseClient.auth.getSession();

    if (error) {
      console.error('Error obteniendo sesión:', error);
      mostrarError('Error al recuperar la sesión: ' + error.message);
      if (loadingEl) loadingEl.style.display = 'none';
      return;
    }

    if (session?.user) {
      persistirChofer(session.user);

      // Limpiar la URL para que no queden tokens visibles
      window.history.replaceState({}, document.title, window.location.pathname);

      // Redirigir al panel
      window.location.replace('/mimi-transporte/chofer-panel.html');
      return;
    }

    if (loadingEl) loadingEl.style.display = 'none';
  } catch (err) {
    console.error('Error en initAuth:', err);
    mostrarError('No se pudo completar el inicio de sesión.');
    const loadingEl = document.getElementById('loading');
    if (loadingEl) loadingEl.style.display = 'none';
  }
}

// Escuchar cambios reales de sesión (más robusto)
supabaseClient.auth.onAuthStateChange((event, session) => {
  console.log('Auth event:', event);

  if (session?.user) {
    persistirChofer(session.user);

    // Evitar que queden tokens en hash
    window.history.replaceState({}, document.title, window.location.pathname);

    if (!window.location.pathname.includes('chofer-panel.html')) {
      window.location.replace('/mimi-transporte/chofer-panel.html');
    }
  }
});

// Ejecutar al cargar
initAuth();

// ========== LOGIN CON GOOGLE ==========
async function loginConGoogle() {
  try {
    const redirectURL = getRedirectURL();

    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: redirectURL,
        skipBrowserRedirect: false
      }
    });

    if (error) throw error;
  } catch (error) {
    console.error('Error en login Google:', error);
    mostrarError('Error al conectar con Google: ' + error.message);
  }
}
    // ========== LOGIN TRADICIONAL ==========
    function loginChofer(event) {
      event.preventDefault();

      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value.trim();

      ocultarError();

      if (usuario === 'chofer' && password === '1234') {
        localStorage.setItem('choferLogueado', 'true');
        localStorage.setItem('choferUsuario', usuario);
        localStorage.setItem('choferAuthProvider', 'manual');
        window.location.href = 'chofer-panel.html';
        return;
      }

      mostrarError('Usuario o contraseña incorrectos');
    }

    function mostrarError(mensaje) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = mensaje;
      errorMsg.style.display = 'block';
    }

    function ocultarError() {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
    }
  </script>
</body>
</html>
