<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>MIMI Driver - Login</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      color: rgba(255,255,255,0.6);
      margin-bottom: 40px;
      text-align: center;
    }

    .login-form {
      width: 100%;
      max-width: 320px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 16px;
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #276EF1;
      background: #242426;
    }

    button {
      width: 100%;
      padding: 18px;
      background: #276EF1;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    button:hover {
      background: #448AFF;
    }

    button:active {
      transform: scale(0.98);
    }

    .error {
      color: #E11900;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="logo">🚐</div>
  <h1>MIMI Driver</h1>
  <p class="subtitle">Ingresá tus credenciales</p>

  <form class="login-form" id="loginForm">
    <div class="form-group">
      <label for="driverId">ID de Conductor</label>
      <input 
        type="text" 
        id="driverId" 
        placeholder="Ej: CHOFER_001"
        required
        autocomplete="username"
      >
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input 
        type="password" 
        id="password" 
        placeholder="••••••••"
        required
        autocomplete="current-password"
      >
    </div>

    <button type="submit">Ingresar</button>
    <div class="error" id="error"></div>
  </form>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const driverId = document.getElementById('driverId').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      
      // Simple validation (replace with real auth)
      if (driverId && password.length >= 4) {
        localStorage.setItem('mimi_driver_id', driverId);
        window.location.href = 'chofer-panel.html';
      } else {
        errorEl.textContent = 'Credenciales inválidas';
        errorEl.classList.add('visible');
      }
    });
  </script>
</body>
</html>
