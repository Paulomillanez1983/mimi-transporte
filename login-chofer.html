<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <title>MIMI Driver - Login</title>

  <link rel="icon" href="./assets/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="./assets/favicon.png" />
  <link rel="manifest" href="/mimi-transporte/manifest.json" />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <script src="./libs/supabase-js.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --card: #111214;
      --muted: rgba(255,255,255,0.62);
      --line: rgba(255,255,255,0.1);
      --primary: #276EF1;
      --primary-hover: #448AFF;
      --danger: #E11900;
      --success: #22c55e;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .shell {
      width: 100%;
      max-width: 380px;
    }

    .shell--hidden {
      opacity: 0;
      transform: translateY(18px) scale(0.985);
      filter: blur(10px);
      pointer-events: none;
    }

    .shell--ready {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
      pointer-events: auto;
      transition:
        opacity .45s ease,
        transform .45s ease,
        filter .45s ease;
    }

    .card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 44%);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(10px);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .logo {
      text-align: center;
      margin-bottom: 8px;
    }

    .logo img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.32));
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.45;
    }

    .login-form {
      width: 100%;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.82);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      background: #1C1C1E;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #fff;
      font-size: 16px;
      transition: border-color .16s ease, transform .12s ease, opacity .12s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
    }

    button:active {
      transform: scale(0.99);
    }

    .primary-btn {
      background: var(--primary);
      color: #fff;
      margin-top: 8px;
    }

    .primary-btn:hover {
      background: var(--primary-hover);
    }

    .google-btn {
      margin-top: 12px;
      background: #fff;
      color: #000;
    }

    .link-btn {
      margin-top: 12px;
      padding: 10px 0 0;
      background: transparent;
      color: #8ab4ff;
      font-size: 14px;
      font-weight: 700;
    }

    .error,
    .ok {
      font-size: 14px;
      margin-top: 14px;
      text-align: center;
      display: none;
      line-height: 1.45;
    }

    .error.visible { display: block; color: var(--danger); }
    .ok.visible { display: block; color: var(--success); }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: rgba(255,255,255,0.48);
      font-size: 12px;
      line-height: 1.45;
    }

    .app-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 42%),
        #000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      visibility: visible;
      transition: opacity .42s ease, visibility .42s ease;
    }

    .app-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .app-splash__inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: splashEnter .45s ease both;
    }

    .app-splash__logo-wrap {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      place-items: center;
      box-shadow: 0 18px 46px rgba(0,0,0,0.38);
      backdrop-filter: blur(10px);
    }

    .app-splash__logo {
      width: 58px;
      height: 58px;
      object-fit: contain;
      animation: pulseLogo 1.5s ease-in-out infinite;
    }

    .app-splash__brand {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
    }

    .app-splash__loader {
      width: 96px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      position: relative;
    }

    .app-splash__loader span {
      display: block;
      width: 45%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(255,255,255,0.22), #fff, rgba(255,255,255,0.22));
      animation: splashLoader 1s ease-in-out infinite;
    }

    @keyframes splashEnter {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes pulseLogo {
      0%, 100% {
        transform: scale(1);
        opacity: 0.96;
      }
      50% {
        transform: scale(1.04);
        opacity: 1;
      }
    }

    @keyframes splashLoader {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(260%); }
    }

    .skeleton {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.06) !important;
      color: transparent !important;
      user-select: none;
    }

    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.12),
        transparent
      );
      animation: skeletonShimmer 1.25s infinite;
    }

    @keyframes skeletonShimmer {
      100% {
        transform: translateX(100%);
      }
    }

    .card.loading .logo,
    .card.loading h1,
    .card.loading .subtitle,
    .card.loading .footer-note {
      border-radius: 12px;
    }

    .card.loading .logo {
      width: 60px;
      height: 60px;
      margin: 0 auto 8px;
    }

    .card.loading h1 {
      width: 56%;
      height: 28px;
      margin: 0 auto 8px;
    }

    .card.loading .subtitle {
      width: 84%;
      height: 18px;
      margin: 0 auto 24px;
    }

    .card.loading .form-group label {
      width: 72px;
      height: 12px;
      border-radius: 999px;
      margin-bottom: 8px;
    }

    .card.loading input,
    .card.loading button,
    .card.loading .footer-note {
      border-radius: 16px;
    }

    .card.loading input {
      color: transparent;
    }

    .page-enter {
      animation: pageEnter .38s ease both;
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.992);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }
  </style>
</head>

<body>
  <div id="appSplash" class="app-splash">
    <div class="app-splash__inner">
      <div class="app-splash__logo-wrap">
        <img
          src="./assets/icons/icon-192x192.png"
          alt="MIMI"
          class="app-splash__logo"
        />
      </div>
      <div class="app-splash__brand">MIMI Driver</div>
      <div class="app-splash__loader">
        <span></span>
      </div>
    </div>
  </div>

  <div class="shell shell--hidden" id="loginShell">
    <div class="card">
      <div class="logo">
        <img src="./assets/icons/icon-192x192.png" alt="MIMI Driver" />
      </div>

      <h1>MIMI Driver</h1>
      <p class="subtitle">
        Ingresá con tu cuenta o continuá con Google
      </p>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>

        <button type="submit" class="primary-btn" id="loginBtn">Ingresar</button>

        <button type="button" class="google-btn" id="googleLoginBtn">
          Continuar con Google
        </button>

        <button type="button" class="link-btn" id="forgotPasswordBtn">
          Olvidé mi contraseña
        </button>

        <div class="error" id="error"></div>
        <div class="ok" id="ok"></div>
      </form>

      <p class="footer-note">
        Si ingresás por primera vez como chofer, luego del login te pediremos validar identidad y documentación.
      </p>
    </div>
  </div>

  <script type="module">
    import supabaseService from "./js/supabase-client.js";
    import CONFIG from "./js/config.js";

    const errorEl = document.getElementById("error");
    const okEl = document.getElementById("ok");
    const loginBtn = document.getElementById("loginBtn");
    const googleLoginBtn = document.getElementById("googleLoginBtn");
    const forgotPasswordBtn = document.getElementById("forgotPasswordBtn");

    const splashEl = document.getElementById("appSplash");
    const loginShell = document.getElementById("loginShell");
    const loginCard = document.querySelector(".card");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add("visible");
      okEl.classList.remove("visible");
    }

    function showOk(msg) {
      okEl.textContent = msg;
      okEl.classList.add("visible");
      errorEl.classList.remove("visible");
    }

    function clearMessages() {
      errorEl.textContent = "";
      okEl.textContent = "";
      errorEl.classList.remove("visible");
      okEl.classList.remove("visible");
    }

    function setLoading(loading, target = null) {
      const buttons = [loginBtn, googleLoginBtn, forgotPasswordBtn];

      buttons.forEach((btn) => {
        if (!btn) return;
        btn.disabled = loading;
        btn.style.opacity = loading ? "0.7" : "1";
        btn.style.pointerEvents = loading ? "none" : "auto";
      });

      loginBtn.textContent = "Ingresar";
      googleLoginBtn.textContent = "Continuar con Google";
      forgotPasswordBtn.textContent = "Olvidé mi contraseña";

      if (loading && target === loginBtn) loginBtn.textContent = "Ingresando...";
      if (loading && target === googleLoginBtn) googleLoginBtn.textContent = "Abriendo Google...";
      if (loading && target === forgotPasswordBtn) forgotPasswordBtn.textContent = "Enviando...";
    }

    function addSkeletons() {
      document.querySelector(".logo")?.classList.add("skeleton");
      document.querySelector("h1")?.classList.add("skeleton");
      document.querySelector(".subtitle")?.classList.add("skeleton");
      document.querySelector(".footer-note")?.classList.add("skeleton");

      document.querySelectorAll(".form-group label").forEach((el) => el.classList.add("skeleton"));
      document.querySelectorAll("input").forEach((el) => el.classList.add("skeleton"));
      document.querySelectorAll("button").forEach((el) => el.classList.add("skeleton"));
    }

    function removeSkeletons() {
      document.querySelectorAll(".skeleton").forEach((el) => el.classList.remove("skeleton"));
    }

    function showInitialLoadingUI() {
      loginCard?.classList.add("loading");
      addSkeletons();
    }

    function hideSplashAndRevealUI() {
      splashEl?.classList.add("hidden");
      loginShell?.classList.remove("shell--hidden");
      loginShell?.classList.add("shell--ready", "page-enter");
      loginCard?.classList.remove("loading");
      removeSkeletons();
    }

    async function smoothNavigate(url) {
      loginShell?.classList.remove("page-enter");
      loginShell.style.opacity = "0";
      loginShell.style.transform = "translateY(10px) scale(0.992)";
      loginShell.style.filter = "blur(8px)";
      await new Promise((resolve) => setTimeout(resolve, 220));
      window.location.replace(url);
    }

    async function ensureProfile(user) {
      const { error } = await supabaseService.client.rpc("ensure_driver_profile_exists", {
        p_user_id: user.id
      });

      if (error) {
        console.error("[ensureProfile] error:", error);
        throw error;
      }
    }

    async function fetchOnboardingStatus(userId) {
      const { data, error } = await supabaseService.client.rpc("get_driver_onboarding_status", {
        p_user_id: userId
      });

      if (error) {
        console.error("[fetchOnboardingStatus] error:", error);
        throw error;
      }

      return data || null;
    }

    async function redirectAfterAuth() {
      await supabaseService.init();

      const { data: userRes, error: userErr } = await supabaseService.client.auth.getUser();
      if (userErr || !userRes?.user) {
        throw userErr || new Error("No hay usuario autenticado");
      }

      const user = userRes.user;

      await ensureProfile(user);
      const status = await fetchOnboardingStatus(user.id);

      const onboardingStatus = status?.onboarding_status || "PENDIENTE_DOCUMENTOS";
      const documentsApproved = status?.documents_approved === true;
      const profileCompleted = status?.profile_completed === true;
      const documentsCompleted = status?.documents_completed === true;
      const hasObservedDocs = status?.has_observed_docs === true;

      if (documentsApproved && onboardingStatus === "APROBADO") {
        await smoothNavigate("chofer-panel.html");
        return;
      }

      if (hasObservedDocs || onboardingStatus === "OBSERVADO") {
        await smoothNavigate("driver-documents-observed.html");
        return;
      }

      if (onboardingStatus === "PENDIENTE_REVISION") {
        await smoothNavigate("driver-review-pending.html");
        return;
      }

      if (!profileCompleted || !documentsCompleted) {
        await smoothNavigate("driver-onboarding.html");
        return;
      }

      await smoothNavigate("driver-onboarding.html");
    }

    async function checkSession() {
      try {
        await supabaseService.init();

        let { data: sessionData, error: sessionError } =
          await supabaseService.client.auth.getSession();

        if (sessionError) {
          console.warn("[checkSession] getSession error:", sessionError);
        }

        let session = sessionData?.session || null;

        if (!session) {
          await new Promise((r) => setTimeout(r, 800));
          const retry = await supabaseService.client.auth.getSession();
          session = retry?.data?.session || null;
        }

        if (!session?.access_token) return;

        const { data: userData, error: userError } =
          await supabaseService.client.auth.getUser();

        if (userError || !userData?.user) {
          console.warn("[checkSession] getUser error:", userError);
          return;
        }

        await redirectAfterAuth();
      } catch (err) {
        console.error("[checkSession] fatal:", err);
      }
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessages();
      setLoading(true, loginBtn);

      try {
        await supabaseService.init();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showError("Ingresá email y contraseña");
          return;
        }

        const { error } = await supabaseService.client.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          showError("❌ " + error.message);
          return;
        }

        showOk("✅ Login correcto...");
        await redirectAfterAuth();
      } catch (err) {
        console.error("[login] error:", err);
        showError("❌ No pudimos iniciar sesión");
      } finally {
        setLoading(false);
      }
    });

    googleLoginBtn.addEventListener("click", async () => {
      clearMessages();
      setLoading(true, googleLoginBtn);

      try {
        await supabaseService.init();

        const { error } = await supabaseService.client.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: "https://paulomillanez1983.github.io/mimi-transporte/login-chofer.html"
          }
        });

        if (error) {
          showError("❌ Error Google: " + error.message);
          return;
        }

        showOk("Abriendo Google...");
      } catch (err) {
        console.error("[googleLogin] error:", err);
        showError("❌ No pudimos abrir Google");
      } finally {
        setLoading(false);
      }
    });

    forgotPasswordBtn.addEventListener("click", async () => {
      clearMessages();
      setLoading(true, forgotPasswordBtn);

      try {
        await supabaseService.init();

        const email = document.getElementById("email").value.trim();

        if (!email) {
          showError("Ingresá tu email para recuperar la contraseña");
          return;
        }

        const { error } = await supabaseService.client.auth.resetPasswordForEmail(email, {
          redirectTo: "https://paulomillanez1983.github.io/mimi-transporte/reset-password.html"
        });

        if (error) {
          showError("❌ " + error.message);
          return;
        }

        showOk("✅ Te enviamos un email para restablecer la contraseña");
      } catch (err) {
        console.error("[forgotPassword] error:", err);
        showError("❌ No pudimos enviar el email de recuperación");
      } finally {
        setLoading(false);
      }
    });

    showInitialLoadingUI();

    window.addEventListener("load", async () => {
      await new Promise((r) => setTimeout(r, 750));
      hideSplashAndRevealUI();
    });

    checkSession();
  </script>
</body>
</html>
