<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>MIMI Driver</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- MapLibre -->
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">

  <!-- Favicon inline -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚐</text></svg>">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow: hidden; }

    #map-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      background: #1a1a2e;
    }

    #ui-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
    }
    #ui-layer > * { pointer-events: auto; }

    .header {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      background: rgba(28,28,30,0.95);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .driver-profile { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #276EF1, #448AFF);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px;
      position: relative;
    }
    .status-dot {
      position: absolute;
      bottom: 0; right: 0;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #E11900;
      border: 2px solid #1C1C1E;
    }
    .status-dot.online { background: #05944F; }

    .driver-info h1 { font-size: 15px; font-weight: 700; }
    .status-text { font-size: 12px; color: rgba(255,255,255,0.6); }

    .stats-floating {
      position: fixed;
      top: 85px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-card {
      background: rgba(28,28,30,0.95);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      border-radius: 12px;
      text-align: center;
      min-width: 70px;
    }
    .stat-value { font-size: 20px; font-weight: 800; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; }

    .fab-online {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #1C1C1E;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .fab-online.online {
      background: #05944F;
      border-color: #05944F;
    }
    .fab-text { font-weight: 700; font-size: 14px; }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1C1C1E;
      border-radius: 20px 20px 0 0;
      padding: 16px;
      transform: translateY(calc(100% - 80px));
      transition: transform 0.3s ease;
    }

    .sheet-handle {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
      cursor: pointer;
    }
    .handle-bar { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }

    .waiting-state { text-align: center; padding: 40px 20px; }
    .pulse-ring {
      width: 60px; height: 60px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: #276EF1;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.05); }
    }

    .toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .global-loading {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 9998;
    }
    .global-loading.active { display: flex; }

    .loading-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #276EF1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Logout button */
    .logout-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 99999;
      background: rgba(255,0,0,0.85);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
      font-size: 13px;
      display: none;
      backdrop-filter: blur(10px);
    }
    .logout-btn.visible { display: block; }
  </style>
</head>

<body>

  <!-- Loading inicial -->
  <div class="loading-screen" id="initial-loading">
    <div class="spinner"></div>
    <p style="margin-top:16px;color:rgba(255,255,255,0.8)">Iniciando...</p>
  </div>

  <!-- Logout -->
  <button class="logout-btn" id="logoutBtn">SALIR</button>

  <!-- Mapa -->
  <div id="map-container"></div>

  <!-- UI -->
  <div id="ui-layer">
    <header class="header">
      <div class="driver-profile">
        <div class="avatar">
          <span id="driver-initial">M</span>
          <div class="status-dot" id="status-dot"></div>
        </div>
        <div class="driver-info">
          <h1 id="driver-name">Conductor</h1>
          <span class="status-text" id="status-text">Desconectado</span>
        </div>
      </div>
    </header>

    <div class="stats-floating">
      <div class="stat-card">
        <span class="stat-value" id="stat-earnings">$0</span>
        <span class="stat-label">Hoy</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-trips">0</span>
        <span class="stat-label">Viajes</span>
      </div>
    </div>

    <button class="fab-online" id="fab-online">
      <span class="fab-icon" id="fab-icon">🔴</span>
      <span class="fab-text" id="fab-text">CONECTAR</span>
    </button>

    <div class="bottom-sheet">
      <div class="sheet-handle">
        <div class="handle-bar"></div>
      </div>
      <div class="waiting-state">
        <div class="pulse-ring"></div>
        <h3>Estás desconectado</h3>
        <p style="color:rgba(255,255,255,0.6)">Toca "CONECTAR" para recibir viajes</p>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <div class="global-loading" id="global-loading">
      <div class="spinner"></div>
      <span style="color:white">Cargando...</span>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>

  <!-- 🔐 SUPABASE AUTH -->
  <script>
    // ⚠️ PEGAR TU SUPABASE REAL
    const SUPABASE_URL = "https://xrphpqmutvadjrucqicn.supabase.co";
    const SUPABASE_ANON_KEY = "PEGAR_TU_ANON_KEY_AQUI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function protegerPanel() {
      const loading = document.getElementById("initial-loading");

      try {
        const { data, error } = await supabaseClient.auth.getSession();

        if (error) {
          console.error("Auth error:", error);
          window.location.href = "login-chofer.html";
          return;
        }

        if (!data.session) {
          window.location.href = "login-chofer.html";
          return;
        }

        const user = data.session.user;

        // Mostrar datos en UI
        const nameEl = document.getElementById("driver-name");
        const initialEl = document.getElementById("driver-initial");

        if (nameEl) nameEl.textContent = user.email || "Conductor";
        if (initialEl) initialEl.textContent = (user.email || "M").substring(0, 1).toUpperCase();

        // Mostrar logout
        document.getElementById("logoutBtn").classList.add("visible");

        // Ocultar loading
        loading?.classList.add("hidden");

        console.log("✅ Sesión activa:", user.email);

      } catch (err) {
        console.error("Error protegiendo panel:", err);
        window.location.href = "login-chofer.html";
      }
    }

    protegerPanel();

    // LOGOUT
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "login-chofer.html";
    });
  </script>

  <!-- Tu app real -->
  <script type="module" src="js/app.js"></script>

  <!-- Conectar/Desconectar UI demo -->
  <script>
    const fab = document.getElementById("fab-online");
    const dot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const fabText = document.getElementById("fab-text");
    const fabIcon = document.getElementById("fab-icon");

    let online = false;

    fab.addEventListener("click", () => {
      online = !online;

      if (online) {
        dot.classList.add("online");
        statusText.textContent = "Conectado";
        fab.classList.add("online");
        fabText.textContent = "DESCONECTAR";
        fabIcon.textContent = "🟢";
      } else {
        dot.classList.remove("online");
        statusText.textContent = "Desconectado";
        fab.classList.remove("online");
        fabText.textContent = "CONECTAR";
        fabIcon.textContent = "🔴";
      }
    });
  </script>

</body>
</html>
