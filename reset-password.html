<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIMI Driver - Restablecer contraseña</title>
  <link rel="manifest" href="/mimi-transporte/manifest.json">
  <script src="./libs/supabase-js.js"></script>
  <style>
    body {
      font-family: Inter, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #131416;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 24px;
    }
    h1 { font-size: 26px; margin-bottom: 12px; text-align: center; }
    p { color: rgba(255,255,255,0.68); line-height: 1.5; margin-bottom: 18px; text-align: center; }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #1C1C1E;
      color: #fff;
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-weight: 800;
      background: #276EF1;
      color: white;
      cursor: pointer;
    }
    .msg {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      line-height: 1.45;
    }
  </style>
  <!-- Vercel Speed Insights -->
  <script src="./speed-insights.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>Nueva contraseña</h1>
    <p>Ingresá tu nueva contraseña para seguir usando tu cuenta.</p>

    <label for="password">Nueva contraseña</label>
    <input id="password" type="password" />

    <label for="password2">Repetir contraseña</label>
    <input id="password2" type="password" />

    <button id="saveBtn">Guardar contraseña</button>
    <div class="msg" id="msg"></div>
  </div>

  <script type="module">
    import supabaseService from "./js/supabase-client.js";

    const msg = document.getElementById("msg");

    function setMsg(text, ok = true) {
      msg.textContent = text;
      msg.style.color = ok ? "#22c55e" : "#E11900";
    }

    document.getElementById("saveBtn").addEventListener("click", async () => {
      try {
        await supabaseService.init();

        const password = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;

        if (!password || password.length < 6) {
          setMsg("La contraseña debe tener al menos 6 caracteres", false);
          return;
        }

        if (password !== password2) {
          setMsg("Las contraseñas no coinciden", false);
          return;
        }

        const { error } = await supabaseService.client.auth.updateUser({
          password
        });

        if (error) {
          setMsg("No pudimos actualizar la contraseña", false);
          return;
        }

        setMsg("✅ Contraseña actualizada correctamente");
        setTimeout(() => {
          window.location.replace("login-chofer.html");
        }, 1200);
      } catch (err) {
        console.error("[reset-password] error:", err);
        setMsg("No pudimos actualizar la contraseña", false);
      }
    });
  </script>
</body>
</html>
