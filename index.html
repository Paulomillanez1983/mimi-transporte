    <!-- Favicon (subí uno a tu repo si querés) -->

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, #e3f2fd 0%, #fce4ec 60%, #f8bbd9 100%);
            color: #333;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            color: #e91e63;
            font-size: 2.8rem;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .frase {
            font-size: 1.3rem;
            color: #1565c0;
            font-style: italic;
            margin: 10px 0 30px;
        }
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #e91e63;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 1.15rem;
            margin: 15px 0;
            line-height: 1.5;
        }
        .link-fallback {
            color: #e91e63;
            font-weight: bold;
            text-decoration: underline;
            font-size: 1.1rem;
        }
        .link-fallback:hover {
            color: #c2185b;
        }
        .footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mimi Transporte Infantil</h1>
        <p class="frase">"Tu hijo viaja seguro,<br>vos tranquilo"</p>
        
        <div class="loader"></div>
        
        <p>Redirigiendo al cotizador en segundos...</p>
        <p>Estamos preparándote la mejor cotización para el transporte de tu hijo ❤️</p>
        
        <p>
            <a href="https://script.google.com/macros/s/AKfycbzlu-KyPgGM7Na6M11WigzrBmYvjsPzwFhCPJq_QwrcA_ILIS21PT3_7OZlZsj6pJQG/exec" 
               class="link-fallback">
                → Click aquí si no redirige automáticamente
            </a>
        </p>
    </div>

    <div class="footer">
        © 2026 Mimi Transporte Infantil • Villa Allende y Córdoba
    </div>
</body>
</html>
