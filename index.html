<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MIMI Transporte Escolar</title>

<style>
:root {
  --azul-oscuro: #1a237e;
  --azul-primario: #1565c0;
  --azul-claro: #42a5f5;
  --verde-wa: #25D366;
  --verde-oscuro: #128c7e;
  --gris-fondo: #f5f7fa;
  --blanco: #ffffff;
  --sombra: 0 4px 20px rgba(0,0,0,0.08);
  --sombra-hover: 0 8px 30px rgba(0,0,0,0.12);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}

body {
  background: var(--gris-fondo);
  min-height: 100vh;
  padding-bottom: 30px;
}

/* Header estilo app */
.header {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 300px;
  height: 300px;
  background: rgba(255,255,255,0.05);
  border-radius: 50%;
}

.header-content {
  display: flex;
  align-items: center;
  gap: 15px;
  position: relative;
  z-index: 1;
}

.vehicle-img {
  width: 80px;
  height: 50px;
  object-fit: contain;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
}

.logo-section {
  flex: 1;
}

.logo-title {
  color: white;
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-subtitle {
  color: rgba(255,255,255,0.9);
  font-size: 0.9rem;
  font-weight: 500;
  margin-top: 2px;
}

.shield-icon {
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  backdrop-filter: blur(10px);
}

/* Notificaciones */
.notification-bell {
  position: relative;
  cursor: pointer;
  padding: 8px;
  color: white;
  font-size: 1.3rem;
}

.notification-badge {
  position: absolute;
  top: 2px;
  right: 2px;
  background: #ff4444;
  color: white;
  font-size: 0.65rem;
  font-weight: bold;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* Toast Notifications */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 350px;
}

.toast {
  background: white;
  border-radius: 16px;
  padding: 16px 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  gap: 12px;
  animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  border-left: 4px solid var(--azul-primario);
  position: relative;
  overflow: hidden;
}

.toast.success { border-left-color: var(--verde-wa); }
.toast.warning { border-left-color: #ff9800; }
.toast.error { border-left-color: #f44336; }

.toast-icon {
  font-size: 1.5rem;
  flex-shrink: 0;
}

.toast-content {
  flex: 1;
}

.toast-title {
  font-weight: 700;
  color: #1a1a1a;
  font-size: 0.95rem;
  margin-bottom: 2px;
}

.toast-message {
  color: #666;
  font-size: 0.85rem;
  line-height: 1.4;
}

.toast-close {
  background: none;
  border: none;
  color: #999;
  cursor: pointer;
  font-size: 1.2rem;
  padding: 4px;
  line-height: 1;
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(100%) scale(0.9); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}

@keyframes slideOutRight {
  to { opacity: 0; transform: translateX(100%) scale(0.9); }
}

/* Contenido principal */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 20px;
}

.hero-text {
  text-align: center;
  padding: 30px 0 20px;
}

.hero-title {
  font-size: 1.6rem;
  color: #1a1a1a;
  font-weight: 700;
  margin-bottom: 8px;
}

.hero-subtitle {
  color: #666;
  font-size: 1rem;
}

/* Tarjeta principal */
.main-card {
  background: white;
  border-radius: 24px;
  padding: 25px;
  box-shadow: var(--sombra);
  margin-bottom: 20px;
}

/* Inputs de ubicación mejorados */
.location-input-group {
  margin-bottom: 16px;
  position: relative;
}

.location-card {
  display: flex;
  align-items: center;
  background: #f8f9fa;
  border: 2px solid transparent;
  border-radius: 16px;
  padding: 16px;
  transition: all 0.3s ease;
  cursor: pointer;
}

.location-card:focus-within {
  background: white;
  border-color: var(--azul-claro);
  box-shadow: 0 0 0 4px rgba(66, 165, 245, 0.1);
}

.location-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  margin-right: 12px;
  flex-shrink: 0;
}

.location-icon.origin {
  background: #e8f5e9;
}

.location-icon.destiny {
  background: #ffebee;
}

.location-text {
  flex: 1;
  min-width: 0;
}

.location-label {
  font-size: 0.75rem;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 700;
  margin-bottom: 4px;
}

.location-input {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 1rem;
  color: #1a1a1a;
  font-weight: 600;
  outline: none;
  text-overflow: ellipsis;
  overflow: hidden;
  white-space: nowrap;
}

.location-input::placeholder {
  color: #aaa;
  font-weight: 400;
}

.location-arrow {
  color: #ccc;
  font-size: 1.2rem;
  margin-left: 8px;
}

/* Autocomplete mejorado */
.autocomplete-container {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: white;
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  margin-top: 8px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 1000;
  display: none;
  border: 1px solid #f0f0f0;
}

.autocomplete-container.visible {
  display: block;
  animation: fadeInDown 0.2s ease;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.autocomplete-item {
  padding: 16px;
  border-bottom: 1px solid #f5f5f5;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: background 0.2s;
}

.autocomplete-item:hover,
.autocomplete-item.selected {
  background: #f8f9fa;
}

.autocomplete-item:last-child {
  border-bottom: none;
}

.autocomplete-icon {
  width: 36px;
  height: 36px;
  background: #e3f2fd;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  margin-top: 2px;
}

.autocomplete-text {
  flex: 1;
  min-width: 0;
}

.autocomplete-primary {
  font-weight: 600;
  color: #1a1a1a;
  font-size: 0.95rem;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.autocomplete-secondary {
  color: #888;
  font-size: 0.85rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.autocomplete-distance {
  color: var(--azul-primario);
  font-size: 0.8rem;
  font-weight: 600;
  background: #e3f2fd;
  padding: 4px 8px;
  border-radius: 20px;
  white-space: nowrap;
}

/* Fecha y hora */
.datetime-card {
  margin-top: 20px;
}

.datetime-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  color: #555;
  font-weight: 600;
  font-size: 0.9rem;
}

.datetime-inputs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.datetime-field {
  background: #f8f9fa;
  border-radius: 12px;
  padding: 12px;
  border: 2px solid transparent;
  transition: all 0.3s;
}

.datetime-field:focus-within {
  background: white;
  border-color: var(--azul-claro);
}

.datetime-field label {
  display: block;
  font-size: 0.75rem;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 700;
  margin-bottom: 4px;
}

.datetime-field input,
.datetime-field select {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 0.95rem;
  color: #1a1a1a;
  font-weight: 600;
  outline: none;
}

/* Botón calcular */
.btn-calcular {
  width: 100%;
  padding: 18px;
  margin-top: 20px;
  background: linear-gradient(135deg, var(--azul-primario) 0%, var(--azul-oscuro) 100%);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(21, 101, 192, 0.3);
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-calcular:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(21, 101, 192, 0.4);
}

.btn-calcular:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

/* Resultado */
.resultado-section {
  margin-top: 25px;
  padding-top: 25px;
  border-top: 2px dashed #e0e0e0;
  display: none;
}

.resultado-section.visible {
  display: block;
  animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.precio-box {
  text-align: center;
  padding: 25px;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
  border-radius: 20px;
  margin-bottom: 20px;
}

.precio-monto {
  font-size: 3rem;
  font-weight: 800;
  color: var(--azul-oscuro);
  line-height: 1;
  margin-bottom: 8px;
}

.precio-moneda {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--azul-primario);
}

.precio-descripcion {
  color: #666;
  font-size: 0.95rem;
  margin-top: 8px;
}

/* Botón WhatsApp */
.btn-whatsapp {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--verde-wa) 0%, var(--verde-oscuro) 100%);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
}

.btn-whatsapp:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
}

/* Features */
.features-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-top: 25px;
}

.feature-card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  box-shadow: var(--sombra);
  transition: transform 0.3s;
}

.feature-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--sombra-hover);
}

.feature-icon {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.feature-title {
  font-weight: 700;
  color: #1a1a1a;
  font-size: 0.9rem;
  margin-bottom: 4px;
}

.feature-desc {
  color: #888;
  font-size: 0.8rem;
}

/* Error */
.error-message {
  background: #ffebee;
  color: #c62828;
  padding: 14px;
  border-radius: 12px;
  margin-top: 15px;
  font-size: 0.9rem;
  font-weight: 600;
  display: none;
  align-items: center;
  gap: 8px;
}

.error-message.visible {
  display: flex;
  animation: shake 0.5s;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Loading spinner */
.spinner {
  width: 20px;
  height: 20px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Responsive */
@media (max-width: 480px) {
  .hero-title { font-size: 1.4rem; }
  .precio-monto { font-size: 2.5rem; }
  .datetime-inputs { grid-template-columns: 1fr; }
  .features-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Header -->
<header class="header">
  <div class="header-content">
    <img src="https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?w=200&h=120&fit=crop" alt="SUV" class="vehicle-img">
    <div class="logo-section">
      <div class="logo-title">MIMI</div>
      <div class="logo-subtitle">Transporte Escolar</div>
    </div>
    <div class="shield-icon">✓</div>
    <div class="notification-bell" onclick="toggleNotifications()">
      🔔
      <span class="notification-badge" id="notifBadge" style="display: none;">3</span>
    </div>
  </div>
</header>

<div class="container">
  <!-- Hero -->
  <div class="hero-text">
    <h1 class="hero-title">¡Viaje Seguro para tus Niños!</h1>
    <p class="hero-subtitle">Pagá solo por los viajes que uses</p>
  </div>

  <!-- Formulario -->
  <div class="main-card">
    <!-- Origen -->
    <div class="location-input-group">
      <div class="location-card" onclick="focusInput('origen')">
        <div class="location-icon origin">📍</div>
        <div class="location-text">
          <div class="location-label">Origen</div>
          <input type="text" 
                 id="origen" 
                 class="location-input" 
                 placeholder="Av. Santa Fe 1234, Buenos Aires"
                 autocomplete="off"
                 oninput="handleInput(this, 'origen')"
                 onfocus="showSuggestions('origen')"
                 onblur="hideSuggestionsDelayed('origen')">
        </div>
        <div class="location-arrow">›</div>
      </div>
      <!-- Autocomplete Origen -->
      <div class="autocomplete-container" id="suggestions-origen">
        <!-- Se llena dinámicamente -->
      </div>
    </div>

    <!-- Destino -->
    <div class="location-input-group">
      <div class="location-card" onclick="focusInput('destino')">
        <div class="location-icon destiny">📍</div>
        <div class="location-text">
          <div class="location-label">Destino</div>
          <input type="text" 
                 id="destino" 
                 class="location-input" 
                 placeholder="Escuela Primaria, Av. Libertador 456"
                 autocomplete="off"
                 oninput="handleInput(this, 'destino')"
                 onfocus="showSuggestions('destino')"
                 onblur="hideSuggestionsDelayed('destino')">
        </div>
        <div class="location-arrow">›</div>
      </div>
      <!-- Autocomplete Destino -->
      <div class="autocomplete-container" id="suggestions-destino">
        <!-- Se llena dinámicamente -->
      </div>
    </div>

    <!-- Fecha y Hora -->
    <div class="datetime-card">
      <div class="datetime-header">
        <span>📅</span>
        <span>Fecha y Hora</span>
      </div>
      <div class="datetime-inputs">
        <div class="datetime-field">
          <label>Fecha</label>
          <input type="date" id="fecha">
        </div>
        <div class="datetime-field">
          <label>Hora</label>
          <input type="time" id="hora" value="08:00">
        </div>
      </div>
    </div>

    <!-- Error -->
    <div class="error-message" id="errorMsg">
      <span>⚠️</span>
      <span id="errorText"></span>
    </div>

    <!-- Botón Calcular -->
    <button class="btn-calcular" id="btnCalcular" onclick="calcularTarifa()">
      <span>Calcular Tarifa</span>
    </button>

    <!-- Resultado -->
    <div class="resultado-section" id="resultado">
      <div class="precio-box">
        <div class="precio-monto">
          <span class="precio-moneda">$</span>
          <span id="precioValor">4000</span>
          <span class="precio-moneda">ARS</span>
        </div>
        <div class="precio-descripcion">Pago por viaje sin compromiso mensual</div>
      </div>
      
      <button class="btn-whatsapp" onclick="reservarWhatsApp()">
        <span>💬</span>
        <span>Reservar Ahora</span>
      </button>
    </div>
  </div>

  <!-- Features -->
  <div class="features-grid">
    <div class="feature-card">
      <div class="feature-icon">🛡️</div>
      <div class="feature-title">Conductores Profesionales</div>
      <div class="feature-desc">Habilitados y certificados</div>
    </div>
    <div class="feature-card">
      <div class="feature-icon">👶</div>
      <div class="feature-title">Viajes Seguros</div>
      <div class="feature-desc">Con butacas especiales</div>
    </div>
  </div>
</div>

<script>
// Datos de ejemplo para autocompletar (simulando Google Places)
const mockAddresses = [
  { primary: "Av. Santa Fe 1234", secondary: "Palermo, Buenos Aires", distance: "2.3 km" },
  { primary: "Av. Santa Fe 5678", secondary: "Recoleta, Buenos Aires", distance: "3.1 km" },
  { primary: "Av. Santa Fe 9012", secondary: "Belgrano, Buenos Aires", distance: "5.7 km" },
  { primary: "Av. Libertador 456", secondary: "Retiro, Buenos Aires", distance: "1.8 km" },
  { primary: "Av. Libertador 789", secondary: "Palermo, Buenos Aires", distance: "4.2 km" },
  { primary: "Escuela Primaria N° 12", secondary: "Av. Libertador 456, CABA", distance: "1.5 km" },
  { primary: "Colegio San Martín", secondary: "Av. Callao 123, CABA", distance: "2.9 km" }
];

let selectedOrigen = null;
let selectedDestino = null;
let currentSuggestions = [];

// Inicializar fecha con mañana
const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 1);
document.getElementById('fecha').value = tomorrow.toISOString().split('T')[0];

// Sistema de notificaciones
class NotificationSystem {
  constructor() {
    this.container = document.getElementById('toastContainer');
    this.notifications = [];
    this.socket = null;
    this.connect();
  }

  connect() {
    // Simular conexión WebSocket para notificaciones en tiempo real
    console.log('🔌 Conectando a servidor de notificaciones...');
    
    // Simular recepción de notificaciones cada 30 segundos (para demo)
    setInterval(() => {
      if (Math.random() > 0.7) {
        this.simulateDriverNotification();
      }
    }, 30000);

    // Notificación inicial
    setTimeout(() => {
      this.show('Bienvenido', 'Sistema de notificaciones activado', 'success');
    }, 1000);
  }

  simulateDriverNotification() {
    const notifs = [
      { title: 'Chofer asignado', msg: 'Juan P. está en camino a tu ubicación', type: 'success' },
      { title: 'Viaje confirmado', msg: 'Tu reserva para mañana está confirmada', type: 'success' },
      { title: 'Recordatorio', msg: 'Tu viaje es en 30 minutos', type: 'warning' }
    ];
    const random = notifs[Math.floor(Math.random() * notifs.length)];
    this.show(random.title, random.msg, random.type);
    
    // Actualizar badge
    const badge = document.getElementById('notifBadge');
    badge.style.display = 'flex';
    badge.textContent = parseInt(badge.textContent || 0) + 1;
  }

  show(title, message, type = 'info', duration = 5000) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    const icons = {
      success: '✅',
      warning: '⚠️',
      error: '❌',
      info: 'ℹ️'
    };
    
    toast.innerHTML = `
      <div class="toast-icon">${icons[type]}</div>
      <div class="toast-content">
        <div class="toast-title">${title}</div>
        <div class="toast-message">${message}</div>
      </div>
      <button class="toast-close" onclick="this.parentElement.remove()">×</button>
    `;
    
    this.container.appendChild(toast);
    
    // Auto-remove
    setTimeout(() => {
      toast.style.animation = 'slideOutRight 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, duration);
    
    // Sonido de notificación (opcional)
    this.playSound(type);
  }

  playSound(type) {
    // Simular sonido de notificación
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    if (type === 'success') {
      oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // Do
      oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // Mi
    } else if (type === 'warning') {
      oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
    }
    
    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
    
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.3);
  }
}

const notifSystem = new NotificationSystem();

// Funciones de UI
function focusInput(type) {
  document.getElementById(type).focus();
}

function handleInput(input, type) {
  const value = input.value.toLowerCase();
  const container = document.getElementById(`suggestions-${type}`);
  
  if (value.length < 2) {
    container.classList.remove('visible');
    return;
  }
  
  // Filtrar direcciones
  const filtered = mockAddresses.filter(addr => 
    addr.primary.toLowerCase().includes(value) || 
    addr.secondary.toLowerCase().includes(value)
  );
  
  renderSuggestions(container, filtered, type);
}

function renderSuggestions(container, suggestions, type) {
  if (suggestions.length === 0) {
    container.innerHTML = `
      <div class="autocomplete-item">
        <div class="autocomplete-icon">🔍</div>
        <div class="autocomplete-text">
          <div class="autocomplete-primary">No se encontraron resultados</div>
          <div class="autocomplete-secondary">Escribí la dirección completa</div>
        </div>
      </div>
    `;
  } else {
    container.innerHTML = suggestions.map((addr, idx) => `
      <div class="autocomplete-item" onclick="selectAddress('${type}', ${idx})" onmouseenter="highlightItem(this)">
        <div class="autocomplete-icon">📍</div>
        <div class="autocomplete-text">
          <div class="autocomplete-primary">${highlightMatch(addr.primary)}</div>
          <div class="autocomplete-secondary">${addr.secondary}</div>
        </div>
        <div class="autocomplete-distance">${addr.distance}</div>
      </div>
    `).join('');
  }
  
  container.classList.add('visible');
  currentSuggestions = suggestions;
}

function highlightMatch(text) {
  const input = document.activeElement.value;
  if (!input) return text;
  const regex = new RegExp(`(${input})`, 'gi');
  return text.replace(regex, '<span style="color: var(--azul-primario); font-weight: 700;">$1</span>');
}

function highlightItem(item) {
  document.querySelectorAll('.autocomplete-item').forEach(el => el.classList.remove('selected'));
  item.classList.add('selected');
}

function selectAddress(type, index) {
  const addr = currentSuggestions[index];
  if (!addr) return;
  
  const input = document.getElementById(type);
  input.value = `${addr.primary}, ${addr.secondary}`;
  
  if (type === 'origen') selectedOrigen = addr;
  else selectedDestino = addr;
  
  document.getElementById(`suggestions-${type}`).classList.remove('visible');
  
  // Notificación de selección
  notifSystem.show('Dirección seleccionada', `${addr.primary} guardada`, 'success', 2000);
}

function showSuggestions(type) {
  const input = document.getElementById(type);
  if (input.value.length >= 2) {
    handleInput(input, type);
  }
}

function hideSuggestionsDelayed(type) {
  setTimeout(() => {
    document.getElementById(`suggestions-${type}`).classList.remove('visible');
  }, 200);
}

function calcularTarifa() {
  const origen = document.getElementById('origen').value;
  const destino = document.getElementById('destino').value;
  const fecha = document.getElementById('fecha').value;
  const hora = document.getElementById('hora').value;
  
  // Validaciones
  if (!origen || !destino) {
    showError('Completá origen y destino');
    return;
  }
  
  if (!fecha || !hora) {
    showError('Seleccioná fecha y hora');
    return;
  }
  
  hideError();
  
  // Simular cálculo
  const btn = document.getElementById('btnCalcular');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Calculando...';
  
  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = '<span>Calcular Tarifa</span>';
    
    // Mostrar resultado con animación
    document.getElementById('resultado').classList.add('visible');
    
    // Animar precio
    animateValue('precioValor', 0, 4000, 1000);
    
    // Notificar al chofer (simulado)
    notifyDriver();
    
    // Scroll al resultado
    document.getElementById('resultado').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 1500);
}

function animateValue(id, start, end, duration) {
  const obj = document.getElementById(id);
  const range = end - start;
  const minTimer = 50;
  let stepTime = Math.abs(Math.floor(duration / range));
  stepTime = Math.max(stepTime, minTimer);
  
  let startTime = new Date().getTime();
  let endTime = startTime + duration;
  let timer;
  
  function run() {
    let now = new Date().getTime();
    let remaining = Math.max((endTime - now) / duration, 0);
    let value = Math.round(end - (remaining * range));
    obj.innerHTML = value.toLocaleString('es-AR');
    if (value == end) clearInterval(timer);
  }
  
  timer = setInterval(run, stepTime);
  run();
}

function notifyDriver() {
  // Simular notificación push al chofer
  console.log('📱 Notificando al chofer...');
  
  setTimeout(() => {
    notifSystem.show('Chofer notificado', 'Un conductor revisará tu solicitud en breve', 'info');
  }, 2000);
}

function reservarWhatsApp() {
  const origen = document.getElementById('origen').value;
  const destino = document.getElementById('destino').value;
  const fecha = document.getElementById('fecha').value;
  const hora = document.getElementById('hora').value;
  const precio = document.getElementById('precioValor').textContent;
  
  const mensaje = `¡Hola! Quiero reservar un viaje con MIMI:

📍 Origen: ${origen}
🎯 Destino: ${destino}
📅 Fecha: ${fecha}
⏰ Hora: ${hora}
💰 Precio: $${precio} ARS

¡Gracias!`;
  
  window.open(`https://wa.me/5493517014863?text=${encodeURIComponent(mensaje)}`, '_blank');
  
  notifSystem.show('Redirigiendo', 'Abriendo WhatsApp...', 'success', 3000);
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorMsg').classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function toggleNotifications() {
  notifSystem.show('Notificaciones', 'Tienes 3 mensajes nuevos', 'info');
  document.getElementById('notifBadge').style.display = 'none';
  document.getElementById('notifBadge').textContent = '0';
}

// Cerrar sugerencias al hacer click fuera
document.addEventListener('click', (e) => {
  if (!e.target.closest('.location-input-group')) {
    document.querySelectorAll('.autocomplete-container').forEach(el => {
      el.classList.remove('visible');
    });
  }
});
</script>
