<script>
const SUPABASE_URL = "https://xrphpqmutvadjrucqicn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhycGhwcW11dHZhZGpydWNxaWNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDY5ODgsImV4cCI6MjA4OTk4Mjk4OH0.0nsO3GBevQzMBCvne17I9L5_Yi4VPYiWedxyntLr4uM";

function createQueryBuilder(table) {
  let state = { table, columns: '*', filters: [], orderBy: null, orderAscending: true, single: false, limit: null };
  const builder = {
    select(columns = '*') { state.columns = columns; return this; },
    eq(column, value) { state.filters.push({ type: 'eq', column, value }); return this; },
    neq(column, value) { state.filters.push({ type: 'neq', column, value }); return this; },
    gt(column, value) { state.filters.push({ type: 'gt', column, value }); return this; },
    lt(column, value) { state.filters.push({ type: 'lt', column, value }); return this; },
    gte(column, value) { state.filters.push({ type: 'gte', column, value }); return this; },
    lte(column, value) { state.filters.push({ type: 'lte', column, value }); return this; },
    like(column, pattern) { state.filters.push({ type: 'like', column, value: pattern }); return this; },
    ilike(column, pattern) { state.filters.push({ type: 'ilike', column, value: pattern }); return this; },
    in(column, values) { if (!Array.isArray(values)) values = [values]; state.filters.push({ type: 'in', column, value: values }); return this; },
    is(column, value) { state.filters.push({ type: 'is', column, value }); return this; },
    or(conditions) { state.filters.push({ type: 'or', value: conditions }); return this; },
    order(column, { ascending = true } = {}) { state.orderBy = column; state.orderAscending = ascending; return this; },
    limit(n) { state.limit = n; return this; },
    single() { state.single = true; return this; },
    async execute() {
      try {
        let url = `${SUPABASE_URL}/rest/v1/${state.table}?select=${encodeURIComponent(state.columns)}`;
        state.filters.forEach(filter => {
          switch (filter.type) {
            case 'eq': url += `&${encodeURIComponent(filter.column)}=eq.${encodeURIComponent(filter.value)}`; break;
            case 'neq': url += `&${encodeURIComponent(filter.column)}=neq.${encodeURIComponent(filter.value)}`; break;
            case 'gt': url += `&${encodeURIComponent(filter.column)}=gt.${encodeURIComponent(filter.value)}`; break;
            case 'lt': url += `&${encodeURIComponent(filter.column)}=lt.${encodeURIComponent(filter.value)}`; break;
            case 'gte': url += `&${encodeURIComponent(filter.column)}=gte.${encodeURIComponent(filter.value)}`; break;
            case 'lte': url += `&${encodeURIComponent(filter.column)}=lte.${encodeURIComponent(filter.value)}`; break;
            case 'like': url += `&${encodeURIComponent(filter.column)}=like.${encodeURIComponent(filter.value)}`; break;
            case 'ilike': url += `&${encodeURIComponent(filter.column)}=ilike.${encodeURIComponent(filter.value)}`; break;
            case 'in': { 
              const vals = filter.value.map(v => `"${String(v).replace(/"/g, '\\"')}"`).join(","); 
              url += `&${encodeURIComponent(filter.column)}=in.(${encodeURIComponent(vals)})`; 
              break; 
            }
            case 'is': url += `&${encodeURIComponent(filter.column)}=is.${encodeURIComponent(filter.value)}`; break;
            case 'or': url += `&or=(${filter.value})`; break;
          }
        });
        if (state.orderBy) { 
          const direction = state.orderAscending ? 'asc' : 'desc'; 
          url += `&order=${encodeURIComponent(state.orderBy)}.${direction}`; 
        }
        if (state.limit) { url += `&limit=${state.limit}`; }
        
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        const response = await fetch(url, { 
          method: "GET", 
          signal: controller.signal, 
          headers: { 
            "apikey": SUPABASE_KEY, 
            "Authorization": "Bearer " + SUPABASE_KEY, 
            "Accept": "application/json" 
          } 
        });
        clearTimeout(timeout);
        let data = null;
        try { data = await response.json(); } catch(e) { data = null; }
        if (!response.ok) return { data: null, error: data };
        if (state.single && Array.isArray(data)) return { data: data[0] || null, error: null };
        return { data, error: null };
      } catch (err) { 
        return { data: null, error: { message: err.message } }; 
      }
    }
  };
  return builder;
}

window.supabase = {
  from(table) { return createQueryBuilder(table); },
  async rpc(functionName, params = {}) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${functionName}`, {
        method: "POST", 
        signal: controller.signal,
        headers: { 
          "apikey": SUPABASE_KEY, 
          "Authorization": "Bearer " + SUPABASE_KEY, 
          "Content-Type": "application/json", 
          "Accept": "application/json" 
        },
        body: JSON.stringify(params)
      });
      clearTimeout(timeout);
      let data = null;
      try { data = await response.json(); } catch(e) { data = null; }
      if (!response.ok) return { data: null, error: data };
      return { data, error: null };
    } catch (err) { 
      return { data: null, error: { message: err.message } }; 
    }
  }
};
</script>

<script>
// ==========================================
// CONFIGURACIÓN
// ==========================================
const CONFIG = {
  COTIZAR_URL: 'https://xrphpqmutvadjrucqicn.supabase.co/functions/v1/cotizar',
  WHATSAPP_NUMBER: '5493517014863',
  MAX_WAYPOINTS: 5
};

// ==========================================
// ESTADO GLOBAL
// ==========================================
let state = {
  origen: null,
  destino: null,
  waypoints: [],
  routeData: null,
  markers: []
};

let mapaCliente = null;
let waypointCounter = 0;

// ==========================================
// NOTIFICACIONES
// ==========================================
class NotificationSystem {
  constructor() { this.container = document.getElementById('toastContainer'); }
  show(title, message, type = 'info', duration = 4000) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: '✅', info: 'ℹ️', warning: '⚠️', error: '❌' };
    toast.innerHTML = `
      <div class="toast-icon">${icons[type]}</div>
      <div class="toast-content">
        <div class="toast-title">${title}</div>
        <div class="toast-message">${message}</div>
      </div>
      <button class="toast-close" onclick="this.parentElement.remove()">×</button>
    `;
    this.container.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
  }
}
const notif = new NotificationSystem();

// ==========================================
// GEOCODIFICACIÓN Y AUTOCOMPLETE
// ==========================================
async function buscarDireccion(query) {
  if (!query || query.trim().length < 3) return [];
  const q = query.trim().toLowerCase().includes('cordoba') ? query.trim() : `${query.trim()}, Córdoba, Argentina`;
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=ar&q=${encodeURIComponent(q)}`);
    const data = await res.json();
    return Array.isArray(data) ? data : [];
  } catch { return []; }
}

function formatearDireccionCorta(r) {
  if (!r?.display_name) return "Dirección";
  const partes = r.display_name.split(",").map(p => p.trim());
  const direccion = partes[0] || "";
  const localidad = partes.find(p => /villa|barrio|cordoba|córdoba/i.test(p)) || partes[2] || "";
  return localidad ? `${direccion}, ${localidad}` : direccion;
}

function setupAutocomplete(inputId, sugerenciasId, onSelect) {
  const input = document.getElementById(inputId);
  const cont = document.getElementById(sugerenciasId);
  if (!input) return;

  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    const val = input.value.trim();
    if (val.length < 3) { cont.style.display = 'none'; return; }
    timer = setTimeout(async () => {
      const results = await buscarDireccion(val);
      mostrarSugerencias(cont, results, onSelect);
    }, 300);
  });
}

function mostrarSugerencias(contenedor, resultados, callback) {
  contenedor.innerHTML = '';
  if (!resultados.length) { contenedor.style.display = 'none'; return; }
  resultados.forEach(r => {
    const item = document.createElement('div');
    item.className = 'sugerencia-item';
    item.innerHTML = `<div class="sugerencia-icon">📍</div><div class="sugerencia-main">${formatearDireccionCorta(r)}</div>`;
    item.onclick = () => {
      callback({ direccion: r.display_name, lat: parseFloat(r.lat), lng: parseFloat(r.lon) });
      contenedor.style.display = 'none';
    };
    contenedor.appendChild(item);
  });
  contenedor.style.display = 'block';
}

// ==========================================
// WAYPOINTS
// ==========================================
function agregarWaypoint() {
  if (state.waypoints.length >= CONFIG.MAX_WAYPOINTS) {
    notif.show('Límite alcanzado', `Máximo ${CONFIG.MAX_WAYPOINTS} paradas`, 'warning');
    return;
  }
  waypointCounter++;
  const id = `waypoint-${waypointCounter}`;
  const container = document.getElementById('waypointsContainer');
  
  const div = document.createElement('div');
  div.className = 'route-input-group';
  div.id = `group-${id}`;
  div.innerHTML = `
    <div class="route-input-wrapper">
      <span class="route-input-icon">📍</span>
      <input type="text" id="${id}" class="route-input" placeholder="Parada ${state.waypoints.length + 1}" autocomplete="off">
      <button class="btn-input-action delete" onclick="eliminarWaypoint('${id}')">✕</button>
    </div>
    <div id="sugerencias-${id}" class="sugerencias"></div>
  `;
  container.appendChild(div);

  state.waypoints.push({ id, data: null });
  setupAutocomplete(id, `sugerencias-${id}`, (data) => {
    const wp = state.waypoints.find(w => w.id === id);
    if (wp) wp.data = data;
  });
  actualizarTimeline();
}

function eliminarWaypoint(id) {
  document.getElementById(`group-${id}`)?.remove();
  state.waypoints = state.waypoints.filter(w => w.id !== id);
  actualizarTimeline();
}

function actualizarTimeline() {
  const tl = document.querySelector('.route-timeline');
  if (!tl) return;
  tl.innerHTML = `
    <div class="timeline-dot origin"></div>
    ${state.waypoints.map(() => `<div class="timeline-dot waypoint"></div>`).join('')}
    <div class="timeline-dot destination"></div>
  `;
}

// ==========================================
// MAPA
// ==========================================
function initMapa() {
  if (mapaCliente) return;
  mapaCliente = new maplibregl.Map({
    container: 'map',
    style: { version: 8, sources: { osm: { type: 'raster', tiles: ['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png','https://b.tile.openstreetmap.org/{z}/{x}/{y}.png','https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256 } }, layers: [{id:'osm', type:'raster', source:'osm'}] },
    center: [-64.19, -31.42], zoom: 12
  });
  mapaCliente.addControl(new maplibregl.NavigationControl(), 'bottom-right');
}

function dibujarRutaEnMapa(coords) {
  if (!mapaCliente) initMapa();
  // Limpiar anterior
  if (mapaCliente.getLayer('route-line')) mapaCliente.removeLayer('route-line');
  if (mapaCliente.getSource('route')) mapaCliente.removeSource('route');
  state.markers.forEach(m => m.remove());
  state.markers = [];

  const puntos = [state.origen, ...state.waypoints.filter(w=>w.data).map(w=>w.data), state.destino].filter(Boolean);
  puntos.forEach((p, i) => {
    const isOrigin = i === 0;
    const isDest = i === puntos.length - 1;
    const el = document.createElement('div');
    el.innerHTML = `<div style="width:28px;height:28px;background:${isOrigin?'#4caf50':isDest?'#f44336':'#ff9800'};border-radius:50%;border:3px solid white;color:white;font-weight:bold;display:flex;align-items:center;justify-content:center;">${isOrigin?'A':isDest?'B':i}</div>`;
    const marker = new maplibregl.Marker({element: el}).setLngLat([p.lng, p.lat]).addTo(mapaCliente);
    state.markers.push(marker);
  });

  mapaCliente.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } } });
  mapaCliente.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#1565c0', 'line-width': 5 } });

  const bounds = coords.reduce((b, c) => b.extend(c), new maplibregl.LngLatBounds(coords[0], coords[0]));
  mapaCliente.fitBounds(bounds, { padding: 50, duration: 800 });
}

// ==========================================
// CÁLCULO DE RUTA
// ==========================================
async function calcularRuta() {
  if (!state.origen || !state.destino) {
    notif.show('Faltan datos', 'Ingresa origen y destino', 'error');
    return;
  }

  const btn = document.getElementById('btnCalcular');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span><span>Calculando ruta...</span>';

  try {
    const waypointsCoords = state.waypoints.filter(w => w.data).map(w => [w.data.lng, w.data.lat]);
    const allCoords = [[state.origen.lng, state.origen.lat], ...waypointsCoords, [state.destino.lng, state.destino.lat]];

    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${allCoords.map(c=>c.join(',')).join(';')}?overview=full&geometries=geojson`);
    const data = await res.json();

    if (data.code !== 'Ok') throw new Error('Error OSRM');

    const route = data.routes[0];
    const distanceKm = (route.distance / 1000).toFixed(1);
    const durationMin = Math.round(route.duration / 60);

    state.routeData = { geometry: route.geometry, distance: distanceKm, duration: durationMin };

    document.getElementById('mapSection').style.display = 'block';
    initMapa();
    setTimeout(() => {
      dibujarRutaEnMapa(route.geometry.coordinates);
      cotizarViaje(distanceKm, durationMin);
    }, 100);

  } catch (e) {
    notif.show('Error', 'Usando cálculo aproximado', 'warning');
    dibujarRutaFallback();
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}

function dibujarRutaFallback() {
  // ... (mantengo tu fallback original si querés, pero por ahora lo simplifico)
  initMapa();
  const puntos = [state.origen, ...state.waypoints.filter(w=>w.data).map(w=>w.data), state.destino].filter(Boolean);
  const coords = puntos.map(p => [p.lng, p.lat]);
  dibujarRutaEnMapa(coords);
  cotizarViaje("5.0", 15); // fallback básico
}

// ==========================================
// COTIZACIÓN (VERSIÓN FINAL ADAPTADA)
// ==========================================
async function cotizarViaje(km, minutos) {
  try {
    const payload = {
      servicio: 'IDA_ESCOLAR',
      origen: state.origen.direccion,
      destino: state.destino.direccion,
      origen_lat: state.origen.lat,
      origen_lng: state.origen.lng,
      destino_lat: state.destino.lat,
      destino_lng: state.destino.lng,
      distancia_km: parseFloat(km),
      duracion_min: parseInt(minutos),
      waypoints: state.waypoints.filter(w => w.data).map(w => ({
        direccion: w.data.direccion,
        lat: w.data.lat,
        lng: w.data.lng
      })),
      fechaHora: new Date().toISOString()
    };

    const res = await fetch(CONFIG.COTIZAR_URL, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY 
      },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      const data = await res.json();
      mostrarCotizacion(data.precio || 0, data.distancia_km || km, data.duracionEstimadaMin || minutos);
    } else {
      throw new Error();
    }
  } catch {
    const precioLocal = Math.round(400 + parseFloat(km)*1250 + parseInt(minutos)*6);
    mostrarCotizacion(precioLocal, km, minutos);
    notif.show('Modo offline', 'Usando precio estimado', 'info');
  }
}

function mostrarCotizacion(precio, km, minutos) {
  document.getElementById('quotePrice').textContent = '$' + Number(precio).toLocaleString('es-AR');
  document.getElementById('detailDistance').textContent = km + ' km';
  document.getElementById('detailDuration').textContent = minutos + ' min';
  document.getElementById('detailStops').textContent = state.waypoints.filter(w => w.data).length;
  document.getElementById('resumenParadas').textContent = `${state.waypoints.filter(w => w.data).length + 1} paradas`;

  document.getElementById('quoteCard').classList.add('visible');
  setTimeout(() => document.getElementById('quoteCard').scrollIntoView({ behavior: 'smooth' }), 300);
}

// ==========================================
// ACCIONES
// ==========================================
function confirmarViaje() {
  const precio = document.getElementById('quotePrice').textContent.replace('$','').replace(/\./g,'');
  const msg = `🚐 *MIMI Transporte Escolar*\n\n` +
    `📍 Origen: ${formatearDireccionCorta({display_name: state.origen.direccion})}\n` +
    state.waypoints.filter(w=>w.data).map((w,i) => `📍 Parada ${i+1}: ${formatearDireccionCorta({display_name: w.data.direccion})}\n`).join('') +
    `🏁 Destino: ${formatearDireccionCorta({display_name: state.destino.direccion})}\n\n` +
    `📏 Distancia: ${state.routeData?.distance || km} km\n` +
    `⏱️ Duración: ${state.routeData?.duration || minutos} min\n` +
    `💰 Precio: $${precio}\n\n¿Confirmamos?`;

  window.open(`https://wa.me/${CONFIG.WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

function compartirRuta() {
  const texto = `Ruta MIMI Transporte 🚐\n${state.routeData?.distance} km • ${state.routeData?.duration} min\nPrecio: ${document.getElementById('quotePrice').textContent}`;
  navigator.clipboard.writeText(texto);
  notif.show('Compartido', 'Resumen copiado', 'success');
}

// ==========================================
// INICIO
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
  setupAutocomplete('inputOrigen', 'sugerenciasOrigen', data => state.origen = data);
  setupAutocomplete('inputDestino', 'sugerenciasDestino', data => state.destino = data);
});
</script>
