<script>
const SUPABASE_URL = "https://xrphpqmutvadjrucqicn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhycGhwcW11dHZhZGpydWNxaWNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDY5ODgsImV4cCI6MjA4OTk4Mjk4OH0.0nsO3GBevQzMBCvne17I9L5_Yi4VPYiWedxyntLr4uM";

function createQueryBuilder(table) {
  let state = { table, columns: '*', filters: [], orderBy: null, orderAscending: true, single: false, limit: null };
  const builder = {
    select(columns = '*') { state.columns = columns; return this; },
    eq(column, value) { state.filters.push({ type: 'eq', column, value }); return this; },
    neq(column, value) { state.filters.push({ type: 'neq', column, value }); return this; },
    gt(column, value) { state.filters.push({ type: 'gt', column, value }); return this; },
    lt(column, value) { state.filters.push({ type: 'lt', column, value }); return this; },
    gte(column, value) { state.filters.push({ type: 'gte', column, value }); return this; },
    lte(column, value) { state.filters.push({ type: 'lte', column, value }); return this; },
    like(column, pattern) { state.filters.push({ type: 'like', column, value: pattern }); return this; },
    ilike(column, pattern) { state.filters.push({ type: 'ilike', column, value: pattern }); return this; },
    in(column, values) { if (!Array.isArray(values)) values = [values]; state.filters.push({ type: 'in', column, value: values }); return this; },
    is(column, value) { state.filters.push({ type: 'is', column, value }); return this; },
    or(conditions) { state.filters.push({ type: 'or', value: conditions }); return this; },
    order(column, { ascending = true } = {}) { state.orderBy = column; state.orderAscending = ascending; return this; },
    limit(n) { state.limit = n; return this; },
    single() { state.single = true; return this; },
    then(onResolve, onReject) { return this.execute().then(onResolve, onReject); },
    async execute() {
      try {
        let url = `${SUPABASE_URL}/rest/v1/${state.table}?select=${encodeURIComponent(state.columns)}`;
        state.filters.forEach(filter => {
          switch (filter.type) {
            case 'eq': url += `&${encodeURIComponent(filter.column)}=eq.${encodeURIComponent(filter.value)}`; break;
            case 'neq': url += `&${encodeURIComponent(filter.column)}=neq.${encodeURIComponent(filter.value)}`; break;
            case 'gt': url += `&${encodeURIComponent(filter.column)}=gt.${encodeURIComponent(filter.value)}`; break;
            case 'lt': url += `&${encodeURIComponent(filter.column)}=lt.${encodeURIComponent(filter.value)}`; break;
            case 'gte': url += `&${encodeURIComponent(filter.column)}=gte.${encodeURIComponent(filter.value)}`; break;
            case 'lte': url += `&${encodeURIComponent(filter.column)}=lte.${encodeURIComponent(filter.value)}`; break;
            case 'like': url += `&${encodeURIComponent(filter.column)}=like.${encodeURIComponent(filter.value)}`; break;
            case 'ilike': url += `&${encodeURIComponent(filter.column)}=ilike.${encodeURIComponent(filter.value)}`; break;
            case 'in': { const vals = filter.value.map(v => `"${String(v).replace(/"/g, '\\"')}"`).join(","); url += `&${encodeURIComponent(filter.column)}=in.(${encodeURIComponent(vals)})`; break; }
            case 'is': url += `&${encodeURIComponent(filter.column)}=is.${encodeURIComponent(filter.value)}`; break;
            case 'or': url += `&or=(${filter.value})`; break;
          }
        });
        if (state.orderBy) { const direction = state.orderAscending ? 'asc' : 'desc'; url += `&order=${encodeURIComponent(state.orderBy)}.${direction}`; }
        if (state.limit) { url += `&limit=${state.limit}`; }
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        const response = await fetch(url, { method: "GET", signal: controller.signal, headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Accept": "application/json" } });
        clearTimeout(timeout);
        let data = null;
        try { data = await response.json(); } catch(e) { data = null; }
        if (!response.ok) return { data: null, error: data };
        if (state.single && Array.isArray(data)) return { data: data[0] || null, error: null };
        return { data, error: null };
      } catch (err) { return { data: null, error: { message: err.message } }; }
    }
  };
  return builder;
}

window.supabase = {
  from(table) { return createQueryBuilder(table); },
  async rpc(functionName, params = {}) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${functionName}`, {
        method: "POST", signal: controller.signal,
        headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(params)
      });
      clearTimeout(timeout);
      let data = null;
      try { data = await response.json(); } catch(e) { data = null; }
      if (!response.ok) return { data: null, error: data };
      return { data, error: null };
    } catch (err) { return { data: null, error: { message: err.message } }; }
  }
};

window.supabaseUpdate = async function(table, matchColumn, matchValue, data) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);
    const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${encodeURIComponent(matchColumn)}=eq.${encodeURIComponent(matchValue)}`, {
      method: "PATCH", signal: controller.signal,
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Content-Type": "application/json", "Accept": "application/json", "Prefer": "return=representation" },
      body: JSON.stringify(data)
    });
    clearTimeout(timeout);
    let result = null;
    try { result = await response.json(); } catch(e) { result = null; }
    if (!response.ok) return { data: null, error: result };
    return { data: result, error: null };
  } catch (err) { return { data: null, error: { message: err.message } }; }
};

window.supabaseInsert = async function(table, data) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);
    
    const body = Array.isArray(data) ? data : [data];
    
    const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST', 
      signal: controller.signal,
      headers: { 
        'apikey': SUPABASE_KEY, 
        'Authorization': "Bearer " + SUPABASE_KEY, 
        'Content-Type': 'application/json', 
        'Accept': 'application/json', 
        'Prefer': 'return=representation' 
      },
      body: JSON.stringify(body)
    });
    
    clearTimeout(timeout);
    
    let result = null;
    try { result = await response.json(); } catch(e) { result = null; }
    
    if (!response.ok) { 
      console.error("❌ RESPUESTA RAW:", result); 
      return { data: null, error: result }; 
    }
    
    return { data: Array.isArray(result) ? result[0] : result, error: null };
    
  } catch (err) { 
    return { data: null, error: { message: err.message } }; 
  }
};

<script>
// ==========================================

};

// ==========================================

let state = {

};

// ==========================================

class NotificationSystem {
  constructor() {
    this.container = document.getElementById('toastContainer');
  }

  show(title, message, type = 'info', duration = 4000) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    const icons = { success: '✅', info: 'ℹ️', warning: '⚠️', error: '❌' };
    
    toast.innerHTML = `
      <div class="toast-icon">${icons[type]}</div>
      <div class="toast-content">
        <div class="toast-title">${title}</div>
        <div class="toast-message">${message}</div>
      </div>
      <button class="toast-close" onclick="this.parentElement.remove()">×</button>
    `;
    
    this.container.appendChild(toast);
    
    setTimeout(() => {
      if (toast.parentElement) {
        toast.style.animation = 'slideInDown 0.3s ease reverse forwards';
        setTimeout(() => toast.remove(), 300);
      }
    }, duration);
  }
}

const notif = new NotificationSystem();

// ==========================================
// GEOCODIFICACIÓN
// ==========================================
async function buscarDireccion(query) {
  if (!query || query.trim().length < 3) return [];

  const limpio = query.trim();

  // Mejor contexto local para Córdoba / Villa Allende / zona norte
  const queryConContexto = /cordoba|córdoba|villa allende|argentina/i.test(limpio)
    ? limpio
    : `${limpio}, Córdoba, Argentina`;

  const url = `https://nominatim.openstreetmap.org/search?` +
    `format=jsonv2&limit=8&countrycodes=ar&addressdetails=1&namedetails=1&` +
    `accept-language=es-AR&dedupe=1&` +
    `viewbox=-64.45,-31.28,-63.95,-31.55&bounded=0&` +
    `q=${encodeURIComponent(queryConContexto)}`;

  try {
    const res = await fetch(url, {
      headers: {
        "Accept": "application/json",
        "Accept-Language": "es-AR,es;q=0.9",
        "User-Agent": "MIMI-Transporte/1.0"
      }
    });

    if (!res.ok) return [];
    const data = await res.json();

    const resultados = (Array.isArray(data) ? data : []).filter(r => {
      const display = (r.display_name || "").toLowerCase();
      return (
        display.includes("córdoba") ||
        display.includes("cordoba") ||
        display.includes("villa allende") ||
        display.includes("argentina")
      );
    });

    // Ordenar resultados más útiles arriba
    const score = (r) => {
      const d = (r.display_name || "").toLowerCase();
      let s = 0;

      if (d.includes("villa allende")) s += 40;
      if (d.includes("córdoba")) s += 25;
      if (d.includes("cordoba")) s += 25;
      if (r.type === "house") s += 20;
      if (r.type === "residential") s += 15;
      if (r.type === "road") s += 12;
      if (r.class === "amenity") s += 10;
      if (r.class === "building") s += 8;

      return s;
    };

    return resultados.sort((a, b) => score(b) - score(a));
  } catch (err) {
    console.error("Error geocodificando:", err);
    return [];
  }
}
  
function formatearDireccionCorta(r) {
  if (!r || !r.display_name) return "Dirección";

  const addr = r.address || {};
  const named = r.namedetails || {};

  const nombreLugar =
    named.name ||
    addr.amenity ||
    addr.shop ||
    addr.tourism ||
    addr.building ||
    addr.school ||
    "";

  const calle = addr.road || addr.pedestrian || addr.footway || "";
  const numero = addr.house_number || "";
  const barrio =
    addr.suburb ||
    addr.neighbourhood ||
    addr.city_district ||
    addr.quarter ||
    "";
  const ciudad =
    addr.city ||
    addr.town ||
    addr.village ||
    addr.municipality ||
    "";
  const provincia = addr.state || "Córdoba";

  // Si es un lugar reconocido (colegio, negocio, punto)
  if (nombreLugar && calle) {
    return `${nombreLugar} · ${calle}${numero ? " " + numero : ""}`;
  }

  if (calle) {
    return `${calle}${numero ? " " + numero : ""}${barrio ? ", " + barrio : ""}`;
  }

  // fallback inteligente
  const partes = r.display_name.split(",").map(p => p.trim()).filter(Boolean);
  return partes.slice(0, 2).join(", ");
}
  function formatearDireccionSecundaria(r) {
  if (!r) return "";

  const addr = r.address || {};
  const barrio =
    addr.suburb ||
    addr.neighbourhood ||
    addr.city_district ||
    addr.quarter ||
    "";

  const ciudad =
    addr.city ||
    addr.town ||
    addr.village ||
    addr.municipality ||
    "Córdoba";

  const provincia = addr.state || "Córdoba";

  return [barrio, ciudad, provincia]
    .filter(Boolean)
    .filter((v, i, arr) => arr.indexOf(v) === i)
    .join(" · ");
}
// ==========================================
// AUTOCOMPLETE
// ==========================================
function setupAutocomplete(inputId, sugerenciasId, onSelect) {
  const input = document.getElementById(inputId);
  const contenedor = document.getElementById(sugerenciasId);

  if (!input || !contenedor) return;

  let timer = null;
  let requestId = 0;

  input.addEventListener('input', () => {
    clearTimeout(timer);
    const texto = input.value.trim();

    if (texto.length < 3) {
      contenedor.style.display = 'none';
      contenedor.innerHTML = '';
      return;
    }

    const currentRequest = ++requestId;

    timer = setTimeout(async () => {
      const resultados = await buscarDireccion(texto);

      if (currentRequest !== requestId) return;

mostrarSugerencias(contenedor, resultados, (r) => {
  const direccionCorta = formatearDireccionCorta(r);
  const direccionSecundaria = formatearDireccionSecundaria(r);

  input.value = direccionCorta;

  onSelect({
    direccion: r.display_name,
    direccionCorta,
    direccionSecundaria,
    lat: parseFloat(r.lat),
    lng: parseFloat(r.lon),
    raw: r
  });

  input.setAttribute('title', `${direccionCorta}${direccionSecundaria ? ' - ' + direccionSecundaria : ''}`);
  contenedor.style.display = 'none';
});      
    }, 300);
  });

  input.addEventListener('focus', () => {
    if (input.value.trim().length >= 3) {
      input.dispatchEvent(new Event('input'));
    }
  });
}
function mostrarSugerencias(contenedor, resultados, callback) {
  contenedor.innerHTML = '';

  if (!resultados || resultados.length === 0) {
    contenedor.style.display = 'none';
    return;
  }

  resultados.forEach(r => {
    const item = document.createElement('div');
    item.className = 'sugerencia-item';

    const direccionPrincipal = formatearDireccionCorta(r);
    const direccionSecundaria = formatearDireccionSecundaria(r);

    item.innerHTML = `
      <div class="sugerencia-icon">📍</div>
      <div class="sugerencia-text">
        <div class="sugerencia-main">${direccionPrincipal}</div>
        ${direccionSecundaria ? `<div class="sugerencia-secondary">${direccionSecundaria}</div>` : ''}
      </div>
    `;

    item.addEventListener('click', () => callback(r));
    item.addEventListener('touchstart', () => {}, { passive: true });

    contenedor.appendChild(item);
  });

  contenedor.style.display = 'block';
}
// ==========================================
// WAYPOINTS

function agregarWaypoint() {
  if (state.waypoints.length >= CONFIG.MAX_WAYPOINTS) {
    notif.show('Límite alcanzado', `Máximo ${CONFIG.MAX_WAYPOINTS} paradas permitidas`, 'warning');
    return;

  waypointCounter++;
  const waypointId = `waypoint-${waypointCounter}`;
  const numeroParada = state.waypoints.length + 1;

  const container = document.getElementById('waypointsContainer');
  const div = document.createElement('div');
  div.className = 'route-input-group';
  div.id = `group-${waypointId}`;
  div.innerHTML = `
    <div class="route-input-wrapper">
      <span class="route-input-icon">📍</span>
      <input type="text" 
       id="${waypointId}" 
       class="route-input waypoint-input" 
       placeholder="Parada ${numeroParada}" 
       autocomplete="street-address"
       autocapitalize="words"
      
       spellcheck="false"
       enterkeyhint="search">
      <div class="route-input-actions">
        <button class="btn-input-action delete" onclick="eliminarWaypoint('${waypointId}')" title="Eliminar">✕</button>
      </div>
    </div>
    <div id="sugerencias-${waypointId}" class="sugerencias"></div>
  `;

  container.appendChild(div);

  state.waypoints.push({
    id: waypointId,
    data: null
  });

  setupAutocomplete(waypointId, `sugerencias-${waypointId}`, (data) => {
    const wp = state.waypoints.find(w => w.id === waypointId);
    if (wp) wp.data = data;
  });

  actualizarTimeline();
  renumerarWaypoints();

  setTimeout(() => {
    document.getElementById(waypointId)?.focus();
  }, 100);
}
function eliminarWaypoint(id) {
  const group = document.getElementById(`group-${id}`);
  if (group) group.remove();

  state.waypoints = state.waypoints.filter(w => w.id !== id);

  actualizarTimeline();
  renumerarWaypoints();
}
  function renumerarWaypoints() {
  const inputs = document.querySelectorAll('#waypointsContainer .waypoint-input');
  inputs.forEach((input, index) => {
    input.placeholder = `Parada ${index + 1}`;
  });
}
function actualizarTimeline() {
  const timeline = document.getElementById('routeTimeline');
  if (!timeline) return;

  const cantidadParadas = state.waypoints.length;

  let dots = `<div class="timeline-dot origin"></div>`;

  for (let i = 0; i < cantidadParadas; i++) {
    const topPercent = ((i + 1) / (cantidadParadas + 1)) * 100;
    dots += `<div class="timeline-dot waypoint" style="top:${topPercent}%; transform: translateY(-50%);"></div>`;
  }

  dots += `<div class="timeline-dot destination"></div>`;

  timeline.innerHTML = dots;
}  
  // ==========================================
// MAPA
// ==========================================
function initMapa() {
  if (mapaCliente) return Promise.resolve();

  const mapDiv = document.getElementById('map');
  if (!mapDiv) return Promise.resolve();

  return new Promise((resolve) => {
    mapaCliente = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: [
              'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',
              'https://b.tile.openstreetmap.org/{z}/{x}/{y}.png',
              'https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'
            ],
            tileSize: 256,
            attribution: '© OpenStreetMap'
          }
        },
        layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
      },
      center: [-64.19, -31.42],
      zoom: 12
    });

    mapaCliente.addControl(new maplibregl.NavigationControl(), 'bottom-right');

    mapaCliente.on('load', () => {
      mapReady = true;
      resolve();
    });

    mapaCliente.on('error', (e) => {
      console.error('❌ Error mapa:', e);
    });
  });
}
async function dibujarRutaEnMapa(coords) {
  await initMapa();

  if (!mapaCliente || !mapReady) return;

  // Limpiar capas anteriores
  if (mapaCliente.getLayer('route-line')) mapaCliente.removeLayer('route-line');
  if (mapaCliente.getSource('route')) mapaCliente.removeSource('route');

  // Limpiar marcadores
  state.markers.forEach(m => m.remove());
  state.markers = [];

  // Agregar marcadores
  const puntos = [
    state.origen,
    ...state.waypoints.filter(w => w.data).map(w => w.data),
    state.destino
  ].filter(Boolean);

  puntos.forEach((punto, index) => {
    const el = document.createElement('div');
    const isOrigin = index === 0;
    const isDest = index === puntos.length - 1;

    el.innerHTML = `
      <div style="
        width: 28px; 
        height: 28px; 
        background: ${isOrigin ? '#4caf50' : isDest ? '#f44336' : '#ff9800'}; 
        border-radius: 50%; 
        border: 3px solid white; 
        box-shadow: 0 3px 8px rgba(0,0,0,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 12px;
      ">
        ${isOrigin ? 'A' : isDest ? 'B' : index}
      </div>
    `;

    const marker = new maplibregl.Marker({ element: el })
      .setLngLat([punto.lng, punto.lat])
      .addTo(mapaCliente);

    state.markers.push(marker);
  });

  const coordinates = coords || puntos.map(p => [p.lng, p.lat]);

  if (!coordinates || coordinates.length < 2) return;

  mapaCliente.addSource('route', {
    type: 'geojson',
    data: {
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates
      }
    }
  });

  mapaCliente.addLayer({
    id: 'route-line',
    type: 'line',
    source: 'route',
    layout: {
      'line-join': 'round',
      'line-cap': 'round'
    },
    paint: {
      'line-color': '#1565c0',
      'line-width': 5,
      'line-opacity': 0.9
    }
  });

  const bounds = coordinates.reduce(
    (b, c) => b.extend(c),
    new maplibregl.LngLatBounds(coordinates[0], coordinates[0])
  );

  mapaCliente.fitBounds(bounds, {
    padding: { top: 50, bottom: 50, left: 50, right: 50 },
    duration: 1000
  });
}
function centrarEnRuta() {
  if (!mapaCliente || !state.routeData) return;
  
  const coords = state.routeData.geometry.coordinates;
  const bounds = coords.reduce(
    (b, c) => b.extend(c),
    new maplibregl.LngLatBounds(coords[0], coords[0])
  );
  
  mapaCliente.fitBounds(bounds, {
    padding: 50,
    duration: 500
  });
}

function reiniciarRuta() {
  document.getElementById('inputOrigen').value = '';
  document.getElementById('inputDestino').value = '';
  document.getElementById('waypointsContainer').innerHTML = '';

  document.querySelectorAll('.sugerencias').forEach(el => {
    el.innerHTML = '';
    el.style.display = 'none';
  });

  if (mapaCliente && mapReady) {
  if (mapaCliente.getLayer('route-line')) mapaCliente.removeLayer('route-line');
  if (mapaCliente.getSource('route')) mapaCliente.removeSource('route');
}

  if (state.markers?.length) {
    state.markers.forEach(m => m.remove());
  }

  state = {
    origen: null,
    destino: null,
    waypoints: [],
    routeData: null,
    map: null,
    markers: [],
    cotizacion: null
  };

  waypointCounter = 0;

  document.getElementById('mapSection').style.display = 'none';
  document.getElementById('quoteCard').classList.remove('visible');

  notif.show('Nueva ruta', 'Planificá tu nuevo viaje', 'info');
}
  
  // ==========================================
// CÁLCULO DE RUTA Y COTIZACIÓN
// ==========================================
async function calcularRuta() {
  const btn = document.getElementById('btnCalcular');
  const btnText = btn.innerHTML;
  
  // Validar datos
  const origenInput = document.getElementById('inputOrigen');
  const destinoInput = document.getElementById('inputDestino');
  
if (!state.origen && origenInput.value) {
  const geo = await buscarDireccion(origenInput.value);
  if (geo.length) {
    state.origen = {
      direccion: geo[0].display_name,
      direccionCorta: formatearDireccionCorta(geo[0]),
      direccionSecundaria: formatearDireccionSecundaria(geo[0]),
      lat: parseFloat(geo[0].lat),
      lng: parseFloat(geo[0].lon),
      raw: geo[0]
    };
    origenInput.value = state.origen.direccionCorta;
  }
}

if (!state.destino && destinoInput.value) {
  const geo = await buscarDireccion(destinoInput.value);
  if (geo.length) {
    state.destino = {
      direccion: geo[0].display_name,
      direccionCorta: formatearDireccionCorta(geo[0]),
      direccionSecundaria: formatearDireccionSecundaria(geo[0]),
      lat: parseFloat(geo[0].lat),
      lng: parseFloat(geo[0].lon),
      raw: geo[0]
    };
    destinoInput.value = state.destino.direccionCorta;
  }
}
  if (!state.origen || !state.destino) {
    notif.show('Faltan datos', 'Ingresá origen y destino', 'error');
    return;
  }
  const waypointInputs = [...document.querySelectorAll('.waypoint-input')];
const waypointsConTextoSinResolver = waypointInputs.filter(input => {
  const wp = state.waypoints.find(w => w.id === input.id);
  return input.value.trim().length > 0 && !wp?.data;
});

if (waypointsConTextoSinResolver.length > 0) {
  notif.show('Paradas incompletas', 'Seleccioná una sugerencia válida para cada parada', 'warning');
  return;
}

  // Loading
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span><span>Calculando...</span>';

  try {
    // Calcular ruta con OSRM (ruta real por calles)
    const waypointsCoords = state.waypoints
      .filter(w => w.data)
      .map(w => [w.data.lng, w.data.lat]);
    
    const allCoords = [
      [state.origen.lng, state.origen.lat],
      ...waypointsCoords,
      [state.destino.lng, state.destino.lat]
    ];

    // Usar OSRM para ruta real
    const osrmUrl = `https://router.project-osrm.org/route/v1/driving/` +
      allCoords.map(c => c.join(',')).join(';') +
      '?overview=full&geometries=geojson';

const osrmRes = await fetch(osrmUrl, {
  headers: {
    'Accept': 'application/json'
  }
});

if (!osrmRes.ok) {
  throw new Error(`OSRM respondió ${osrmRes.status}`);
}

const osrmData = await osrmRes.json();

if (!osrmData || osrmData.code !== 'Ok' || !osrmData.routes?.length) {
  throw new Error('No se pudo calcular la ruta real');
}
    const route = osrmData.routes[0];
    const distanceKm = (route.distance / 1000).toFixed(1);
    const durationMin = Math.round(route.duration / 60);

    // Guardar datos
    state.routeData = {
      geometry: route.geometry,
      distance: distanceKm,
      duration: durationMin,
      waypoints: allCoords.length - 2
    };

    // Mostrar mapa
    document.getElementById('mapSection').style.display = 'block';
await dibujarRutaEnMapa(route.geometry.coordinates);

// Calcular precio
await cotizarViaje(distanceKm, durationMin);

    } catch (err) {
    console.error(err);
    notif.show('Error', 'No se pudo calcular la ruta. Intentá de nuevo.', 'error');
    
    // Fallback: dibujar línea recta
    await dibujarRutaFallback();
  } finally {
    btn.disabled = false;
    btn.innerHTML = btnText;
  }
}

async function dibujarRutaFallback() {
  document.getElementById('mapSection').style.display = 'block';
  await initMapa();

  const puntos = [
    state.origen,
    ...state.waypoints.filter(w => w.data).map(w => w.data),
    state.destino
  ].filter(Boolean);

  const coords = puntos.map(p => [p.lng, p.lat]);

  let totalDistance = 0;
  for (let i = 0; i < coords.length - 1; i++) {
    const from = turf.point(coords[i]);
    const to = turf.point(coords[i + 1]);
    totalDistance += turf.distance(from, to, { units: 'kilometers' });
  }

  const distanceKm = (totalDistance * 1.4).toFixed(1);
  const durationMin = Math.round((totalDistance * 1.4 / 30) * 60);

  state.routeData = {
    geometry: { type: 'LineString', coordinates: coords },
    distance: distanceKm,
    duration: durationMin,
    waypoints: coords.length - 2
  };

  await dibujarRutaEnMapa(coords);
  await cotizarViaje(distanceKm, durationMin);
}
async function cotizarViaje(km, minutos) {
  try {
    const waypointsValidos = state.waypoints
      .filter(w => w.data)
      .map(w => ({
        direccion: w.data.direccion,
        direccionCorta: w.data.direccionCorta || w.data.direccion,
        lat: Number(w.data.lat),
        lng: Number(w.data.lng)
      }));

    const payload = {
      servicio: 'IDA_ESCOLAR',

      origen: state.origen.direccion,
      origen_corto: state.origen.direccionCorta || state.origen.direccion,

      destino: state.destino.direccion,
      destino_corto: state.destino.direccionCorta || state.destino.direccion,

      origen_lat: Number(state.origen.lat),
      origen_lng: Number(state.origen.lng),

      destino_lat: Number(state.destino.lat),
      destino_lng: Number(state.destino.lng),

      distancia_km: Number(km),
      duracion_min: Number(minutos),
      fechaHora: new Date().toISOString(),

      waypoints: waypointsValidos
    };

    console.log("📤 Payload cotización:", payload);

    const response = await fetch(CONFIG.COTIZAR_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify(payload)
    });

    const data = await response.json().catch(() => null);

    console.log("📥 Respuesta cotización:", data);

    if (!response.ok || !data?.exito) {
      throw new Error(data?.error || 'No se pudo cotizar');
    }

    const precio = Number(data.precio || 0);
    const distancia = Number(data.distancia_km || km);
    const duracion = Number(data.duracionEstimadaMin || minutos);

    state.cotizacion = data;

    mostrarCotizacion(precio, distancia, duracion);

  } catch (err) {
    console.error('❌ Error cotizando:', err);

    state.cotizacion = null;

    notif.show(
      'No disponible',
      'No pudimos obtener el precio en este momento. Intentá nuevamente.',
      'error'
    );

    document.getElementById('quoteCard').classList.remove('visible');
  }
}
function mostrarCotizacion(precio, km, minutos) {
  const card = document.getElementById('quoteCard');
  const paradasIntermedias = state.waypoints.filter(w => w.data).length;
  const puntosTotales = paradasIntermedias + 2; // origen + destino + intermedias

document.getElementById('quotePrice').textContent =
  '$' + Number(precio).toLocaleString('es-AR');
  let label = 'Precio estimado';

if (state.cotizacion?.modo === 'fallback_local') {
  label = 'Estimación provisoria';
}

document.querySelector('.quote-price-label').textContent = label;
  document.getElementById('detailDistance').textContent = Number(km).toFixed(1) + ' km';
  document.getElementById('detailDuration').textContent = Math.round(Number(minutos)) + ' min';
  document.getElementById('detailStops').textContent = paradasIntermedias;
document.getElementById('resumenParadas').textContent =
  paradasIntermedias === 0
    ? 'Viaje directo'
    : `${paradasIntermedias} parada${paradasIntermedias > 1 ? 's' : ''} intermedia${paradasIntermedias > 1 ? 's' : ''}`;
  card.classList.add('visible');

  setTimeout(() => {
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 300);
}
// ==========================================
// ACCIONES
// ==========================================
function confirmarViaje() {
  if (!state.origen || !state.destino || !state.routeData) {
    notif.show('Faltan datos', 'Primero calculá el viaje', 'warning');
    return;
  }

  const cotizacionId = state.cotizacion?.cotizacion_id || 'sin-id';

  const mensaje = `🚐 *MIMI Transporte Escolar*\n\n` +
    `🧾 *Cotización:* ${cotizacionId}\n\n` +
`📍 *Origen:* ${state.origen.direccionCorta || state.origen.direccion}\n` +
`${state.waypoints.filter(w => w.data).map((w, i) => 
  `📍 *Parada ${i + 1}:* ${w.data.direccionCorta || w.data.direccion}\n`
).join('')}` +
`🏁 *Destino:* ${state.destino.direccionCorta || state.destino.direccion}\n\n` +
`📏 *Distancia:* ${state.routeData.distance} km\n` +
`⏱️ *Duración:* ${state.routeData.duration} min\n` +
`💰 *Precio:* ${document.getElementById('quotePrice').textContent}\n\n` +
`✅ ¿Confirmamos el viaje?`;

  window.open(`https://wa.me/${CONFIG.WHATSAPP_NUMBER}?text=${encodeURIComponent(mensaje)}`, '_blank');
}
async function compartirRuta() {
  if (!state.routeData) {
    notif.show('Sin ruta', 'Primero calculá el viaje', 'warning');
    return;
  }

  const precio = state.cotizacion?.precio || 0;

  const texto = `Mirá la ruta de mi viaje con MIMI Transporte 🚐
📍 ${state.origen?.direccionCorta || 'Origen'} → ${state.destino?.direccionCorta || 'Destino'}
🛣️ ${state.routeData.distance} km en ${state.routeData.duration} min
💰 $${Number(precio).toLocaleString('es-AR')}`;

  try {
    if (navigator.share) {
      await navigator.share({
        title: 'Mi viaje con MIMI',
        text: texto
      });
    } else if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(texto);
      notif.show('Copiado', 'El resumen se copió al portapapeles', 'success');
    } else {
      notif.show('No disponible', 'Tu navegador no permite compartir en este momento', 'warning');
    }
  } catch (_) {}
}
