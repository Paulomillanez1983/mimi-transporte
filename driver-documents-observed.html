<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIMI Driver - Documentos observados</title>
<link rel="manifest" href="/mimi-transporte/manifest.json">
  <style>
    body {
      font-family: Inter, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #131416;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
    }
    h1 { font-size: 26px; margin-bottom: 10px; }
    p { color: rgba(255,255,255,0.68); line-height: 1.5; }
    button {
      margin-top: 18px;
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-weight: 800;
      background: #276EF1;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Documentación observada</h1>
    <p>
      Encontramos uno o más documentos con problemas. Volvé a cargar la documentación corregida para continuar con la revisión.
    </p>
    <button onclick="window.location.replace('driver-onboarding.html')">Corregir documentación</button>
  </div>
</body>
</html>
