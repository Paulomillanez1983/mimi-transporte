<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MIMI</title>
  <meta name="description" content="Elegí entre MIMI Transporte y MIMI Servicios.">
  <link rel="icon" type="image/svg+xml" href="./assets/icons/mimi-mark.svg">
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0b1220;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    .wrap{
      width:min(900px,92vw);
      text-align:center;
    }
    h1{font-size:3rem;margin-bottom:12px}
    p{color:#cbd5e1;margin-bottom:28px}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:18px;
    }
    .card{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      border-radius:20px;
      padding:24px;
    }
    .btn{
      display:inline-block;
      margin-top:16px;
      padding:12px 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
    }
    .btn-transport{background:#7cc7ff;color:#062033}
    .btn-services{background:#4adea4;color:#052116}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>MIMI</h1>
    <p>Elegí cómo querés usar la plataforma.</p>

    <div class="grid">
      <section class="card">
        <h2>Transporte</h2>
        <p>Viajes y transporte escolar.</p>
        <a class="btn btn-transport" href="./index.html">Entrar a Transporte</a>
      </section>

      <section class="card">
        <h2>Servicios</h2>
        <p>Marketplace de servicios para clientes y prestadores.</p>
        <a class="btn btn-services" href="./mimi-servicios/">Entrar a Servicios</a>
      </section>
    </div>
  </main>
</body>
</html>
