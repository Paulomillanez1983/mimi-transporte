<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MIMI</title>
  <meta name="description" content="Elegí entre MIMI Transporte y MIMI Servicios.">
  <link rel="icon" type="image/svg+xml" href="./assets/icons/mimi-mark.svg">
  <style>
    :root{
      --bg:#0b1220;
      --bg-2:#111a2e;
      --text:#ffffff;
      --muted:#cbd5e1;
      --card:#ffffff14;
      --card-border:#ffffff1f;
      --transport:#7cc7ff;
      --transport-text:#062033;
      --services:#4adea4;
      --services-text:#052116;
      --shadow:0 20px 60px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:
        radial-gradient(circle at top, #1a2642 0%, var(--bg) 55%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:24px;
    }

    .wrap{
      width:min(960px,100%);
      text-align:center;
    }

    h1{
      font-size:clamp(2.4rem, 6vw, 4rem);
      margin:0 0 12px;
      letter-spacing:.04em;
    }

    .subtitle{
      color:var(--muted);
      margin:0 0 32px;
      font-size:1.05rem;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:24px;
      padding:28px;
      text-align:left;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .card h2{
      margin:0 0 10px;
      font-size:1.7rem;
    }

    .card p{
      margin:0;
      color:var(--muted);
      line-height:1.55;
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:14px 20px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      transition:transform .18s ease, opacity .18s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:.96;
    }

    .btn-transport{
      background:var(--transport);
      color:var(--transport-text);
    }

    .btn-services{
      background:var(--services);
      color:var(--services-text);
    }

    .footer-note{
      margin-top:22px;
      color:#94a3b8;
      font-size:.95rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>MIMI</h1>
    <p class="subtitle">Elegí cómo querés usar la plataforma.</p>

    <div class="grid">
      <section class="card">
        <h2>Transporte</h2>
        <p>Viajes y transporte escolar.</p>
        <a class="btn btn-transport" href="./index.html">Entrar a Transporte</a>
      </section>

      <section class="card">
        <h2>Servicios</h2>
        <p>Marketplace de servicios para clientes y prestadores.</p>
        <a class="btn btn-services" href="./mimi-servicios/">Entrar a Servicios</a>
      </section>
    </div>

    <p class="footer-note">MIMI Plataforma</p>
  </main>
</body>
</html>
