<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIMI - Portal Choferes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .hero-image {
      width: 100%;
      max-height: 85vh;
      object-fit: contain;
      object-position: top;
    }
    
    .cta-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(26,26,46,0.95), transparent);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .btn-ingresar {
      background: linear-gradient(135deg, #ff9800, #f57c00);
      color: white;
      border: none;
      padding: 18px 32px;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn-ingresar:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 152, 0, 0.5);
    }
    
    .btn-ingresar:active {
      transform: translateY(0);
    }
    
    .btn-secundario {
      background: transparent;
      color: rgba(255,255,255,0.7);
      border: 2px solid rgba(255,255,255,0.3);
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-secundario:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    
    .logo-mini {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 1.5rem;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="logo-mini">🚐 MIMI</div>
  
  <!-- Imagen promocional -->
  <img src="https://raw.githubusercontent.com/Paulomillanez1983/mimi-transporte/main/flyer-chofer.jpg" 
       alt="Sumate como chofer MIMI" 
       class="hero-image"
       onerror="this.src='https://placehold.co/600x800/1a1a2e/ffffff?text=MIMI+Transporte+Infantil'">
  
  <div class="cta-container">
    <button class="btn-ingresar" onclick="ingresarPanel()">
      🚀 Ingresar al Panel
    </button>
    <button class="btn-secundario" onclick="contactar()">
      📞 Quiero ser chofer
    </button>
  </div>

  <script>
    function ingresarPanel() {
      window.location.href = 'chofer-panel.html';
    }
    
    function contactar() {
      window.open('https://wa.me/5493517014863?text=Hola!%20Quiero%20sumarme%20como%20chofer%20MIMI', '_blank');
    }
  </script>
</body>
</html>
