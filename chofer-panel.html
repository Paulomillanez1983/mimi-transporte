<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>Panel de Chofer - Mimi</title>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
  />
  <link rel="icon" href="/mimi-transporte/favicon.ico" />

  <!-- CSS APP -->
  <link rel="stylesheet" href="/mimi-transporte/css/driver.css" />

  <!-- MAPLIBRE -->
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <!-- MAPA -->
  <div id="mainMap"></div>

  <!-- UI -->
  <div class="ui-layer">
    <!-- HEADER -->
    <div class="header-float glass-card">
      <div class="driver-mini">
        <div class="driver-mini-avatar">🚐</div>
        <div class="driver-mini-info">
          <h3 id="driverName">Cargando...</h3>
          <p id="estadoChofer">Offline</p>
        </div>
      </div>

      <button class="btn-icon" onclick="logout()" aria-label="Cerrar sesión">🚪</button>
    </div>

    <!-- STATS -->
    <div class="stats-float">
      <div class="stat-card glass-card">
        <div class="stat-value" id="statPendientes">0</div>
        <div class="stat-label">Ofertas</div>
      </div>
      <div class="stat-card glass-card">
        <div class="stat-value" id="statHoy">0</div>
        <div class="stat-label">Hoy</div>
      </div>
    </div>

    <!-- PANEL -->
    <div class="trip-panel glass-panel" id="tripPanel">
      <div class="panel-handle" id="panelHandle">
        <div class="panel-grabber"></div>
        <div class="panel-title-row">
          <div>
            <h3 id="panelTitle">Solicitudes</h3>
            <p id="panelSubtitle">Esperando solicitudes asignadas...</p>
          </div>
          <div id="tripCountBadge" class="trip-count-badge">0</div>
        </div>
      </div>

      <div class="panel-content" id="panelContent">
        <button class="btn btn-primary btn-disponibilidad" id="btnToggleDisponibilidad">
          Cambiar disponibilidad
        </button>

        <div id="tripList"></div>
      </div>
    </div>

    <!-- NAV PANEL -->
    <div id="navPanel" class="nav-panel">
      <div class="nav-main">
        <div class="nav-arrow" id="navArrow">⬆️</div>
        <div class="nav-info">
          <div class="nav-street" id="navStreet">Ruta activa</div>
          <div class="nav-next" id="navNext">Esperando navegación</div>
        </div>
        <div class="nav-distance" id="navDistance">--</div>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <!-- MODAL VIAJE ENTRANTE -->
    <div id="incomingModal" class="incoming-modal">
      <div class="incoming-modal-card">
        <div class="incoming-header">
          <div>
            <h3>Solicitud de viaje</h3>
            <p class="incoming-subtitle">Nueva oferta disponible</p>
          </div>

          <div class="countdown-box">
            <span id="countdownText">30</span>s
          </div>
        </div>

        <div class="countdown-bar-wrap">
          <div id="countdownProgress" class="countdown-bar"></div>
        </div>

        <div id="incomingDetails"></div>

        <div class="incoming-actions">
          <button id="btnRejectIncoming" class="btn btn-danger">Rechazar</button>
          <button id="btnAcceptIncoming" class="btn btn-success">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (typeof maplibregl === 'undefined') {
      alert('Error cargando el mapa. Revisá conexión o bloqueador.');
    }
  </script>

  <script>
    // Fix viewport real en mobile
    (function () {
      const setAppHeight = () => {
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--app-vh', `${vh}px`);
      };

      setAppHeight();
      window.addEventListener('resize', setAppHeight);
      window.addEventListener('orientationchange', setAppHeight);

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setAppHeight);
      }
    })();
  </script>

  <script type="module">
    import DriverApp from '/mimi-transporte/js/driver-app.js';
    import supabaseService from '/mimi-transporte/js/supabase-client.js';

    const app = new DriverApp();
    window.logout = () => supabaseService.logout();

    app.init();
  </script>
</body>
</html>
