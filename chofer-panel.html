<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Chofer - Mimi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS (FIX ruta relativa) -->
  <link rel="stylesheet" href="./css/styles.css">

  <!-- Google Maps (FIX performance + async) -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY&callback=initMap">
  </script>
</head>

<body>

  <!-- MAPA -->
  <div id="mainMap"></div>

  <!-- CAPA UI -->
  <div class="ui-layer">

    <!-- HEADER FLOTANTE -->
    <div class="header-float">
      <div class="driver-mini">
        <div class="driver-mini-avatar">🚐</div>
        <div class="driver-mini-info">
          <h3 id="driverName">Cargando...</h3>
          <p id="estadoChofer">Offline</p>
        </div>
      </div>

      <div class="btn-icon" onclick="logout()">🚪</div>
    </div>

    <!-- PANEL INFERIOR -->
    <div class="trip-panel" id="tripPanel">

      <div class="panel-content">

        <button class="btn btn-primary" id="btnToggleDisponibilidad">
          Cambiar disponibilidad
        </button>

        <h3 style="margin-top: 15px;">Viajes disponibles</h3>

        <div id="tripList"></div>

      </div>
    </div>

  </div>

  <!-- APP -->
  <script type="module">
    import DriverApp from './js/driver-app.js';

    const app = new DriverApp();

    // Google Maps callback (FIX error init)
    window.initMap = () => {
      app.init();
    };

    // Logout
    window.logout = () => {
      localStorage.removeItem('choferData');
      window.location.href = './login-chofer.html';
    };
  </script>

</body>
</html>
