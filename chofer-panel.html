<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Panel de Chofer - Mimi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/mimi-transporte/favicon.ico" />

  <!-- CSS APP -->
  <link rel="stylesheet" href="/mimi-transporte/css/driver.css" />

  <!-- MAPLIBRE -->
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <!-- MAPA -->
  <div id="mainMap"></div>

  <!-- UI -->
  <div class="ui-layer">
    <!-- HEADER -->
    <div class="header-float">
      <div class="driver-mini">
        <div class="driver-mini-avatar">🚐</div>
        <div class="driver-mini-info">
          <h3 id="driverName">Cargando...</h3>
          <p id="estadoChofer">Offline</p>
        </div>
      </div>

      <div class="btn-icon" onclick="logout()">🚪</div>
    </div>

    <!-- STATS -->
    <div class="stats-float">
      <div class="stat-card">
        <div class="stat-value" id="statPendientes">0</div>
        <div class="stat-label">Pendientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statHoy">0</div>
        <div class="stat-label">Hoy</div>
      </div>
    </div>

    <!-- PANEL -->
    <div class="trip-panel" id="tripPanel">
      <div class="panel-content" id="panelContent">
        <button class="btn btn-primary" id="btnToggleDisponibilidad">
          Cambiar disponibilidad
        </button>

        <h3 style="margin-top: 15px;">Viajes disponibles</h3>
        <div id="tripList"></div>
      </div>
    </div>

    <!-- NAV PANEL -->
    <div id="navPanel" class="nav-panel"></div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <!-- MODAL VIAJE ENTRANTE -->
    <div id="incomingModal" class="incoming-modal">
      <div class="incoming-modal-card">
        <div class="incoming-header">
          <h3>Nuevo viaje</h3>
          <div class="countdown-box">
            <span id="countdownText">30</span>s
          </div>
        </div>

        <div class="countdown-bar-wrap">
          <div id="countdownProgress" class="countdown-bar"></div>
        </div>

        <div id="incomingDetails"></div>

        <div class="incoming-actions">
          <button id="btnRejectIncoming" class="btn btn-danger">Rechazar</button>
          <button id="btnAcceptIncoming" class="btn btn-success">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (typeof maplibregl === 'undefined') {
      alert('Error cargando el mapa. Revisá conexión o bloqueador.');
    }
  </script>

  <script type="module">
    import DriverApp from '/mimi-transporte/js/driver-app.js';
    import supabaseService from '/mimi-transporte/js/supabase-client.js';

    const app = new DriverApp();
    window.logout = () => supabaseService.logout();

    app.init();
  </script>
</body>
</html>
