<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#000000" />
  
  <title>Panel de Chofer - MIMI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  
  <link rel="icon" href="/mimi-transporte/favicon.ico" />
  
  <!-- CSS -->
  <link rel="stylesheet" href="/mimi-transporte/css/driver.css" />
  
  <!-- MapLibre -->
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" crossorigin="anonymous" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js" crossorigin="anonymous"></script>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
</head>

<body>
  <!-- Mapa -->
  <div id="mainMap"></div>
  
  <!-- Capa UI -->
  <div class="ui-layer">
    <!-- Header -->
    <header class="header-float">
      <div class="driver-mini">
        <div class="driver-mini-avatar">🚐</div>
        <div class="driver-mini-info">
          <h3 id="driverName">Cargando...</h3>
          <p id="estadoChofer">Iniciando...</p>
        </div>
      </div>
      <button class="btn-icon" onclick="logout()" aria-label="Cerrar sesión">🚪</button>
    </header>
    
    <!-- Stats -->
    <div class="stats-float">
      <div class="stat-card">
        <div class="stat-value" id="statPendientes">0</div>
        <div class="stat-label">Ofertas</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statHoy">0</div>
        <div class="stat-label">Hoy</div>
      </div>
    </div>
    
    <!-- Panel de Navegación Principal (estilo Google Maps) -->
    <div id="navPanel" class="nav-panel">
      <div class="nav-main">
        <div class="nav-arrow" id="navArrow">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
          </svg>
        </div>
        <div class="nav-info">
          <div class="nav-street" id="navStreet">Esperando...</div>
          <div class="nav-next" id="navNext">Inicia un viaje para navegar</div>
        </div>
        <div class="nav-distance" id="navDistance">--</div>
      </div>
    </div>
    
    <!-- Barra de instrucción siguiente -->
    <div id="navInstructionBar" class="nav-instruction-bar">
      <div class="nav-instruction-icon" id="navInstructionIcon">↱</div>
      <div class="nav-instruction-text" id="navInstructionText">Continúa recto</div>
    </div>
    
    <!-- Panel de llegada -->
    <div id="arrivalPanel" class="arrival-panel">
      <h3>🏁 Has llegado</h3>
      <p id="arrivalText">Destino alcanzado</p>
      <div class="arrival-actions">
        <button class="btn btn-secondary" id="btnContinueNav">Continuar</button>
        <button class="btn btn-success" id="btnFinishTrip">Finalizar</button>
      </div>
    </div>
    
    <!-- Panel de Viajes -->
    <div class="trip-panel" id="tripPanel">
      <div class="panel-handle" id="panelHandle">
        <div class="panel-grabber"></div>
        <div class="panel-title-row">
          <div>
            <h3 id="panelTitle">Solicitudes</h3>
            <p id="panelSubtitle">Esperando solicitudes...</p>
          </div>
          <div id="tripCountBadge" class="trip-count-badge">0</div>
        </div>
      </div>
      
      <div class="panel-content" id="panelContent">
        <button class="btn btn-primary btn-disponibilidad" id="btnToggleDisponibilidad">
          <span>🟢</span> Conectarse
        </button>
        
        <div id="tripList" class="trip-list"></div>
      </div>
    </div>
    
    <!-- Toast -->
    <div id="toast" class="toast"></div>
    
    <!-- Modal de Viaje Entrante -->
    <div id="incomingModal" class="incoming-modal">
      <div class="incoming-modal-card">
        <div class="incoming-header">
          <div>
            <h3>🚗 Nueva solicitud</h3>
            <p class="incoming-subtitle">Toca aceptar para tomar el viaje</p>
          </div>
          <div class="countdown-box">
            <span id="countdownText">30</span>s
          </div>
        </div>
        
        <div class="countdown-bar-wrap">
          <div id="countdownProgress" class="countdown-bar"></div>
        </div>
        
        <div id="incomingDetails"></div>
        
        <div class="incoming-actions">
          <button id="btnRejectIncoming" class="btn btn-secondary">
            <span>✕</span> Rechazar
          </button>
          <button id="btnAcceptIncoming" class="btn btn-success">
            <span>✓</span> Aceptar
          </button>
        </div>
      </div>
    </div>
    
    <!-- Loading Global -->
    <div id="globalLoading" class="global-loading">
      <div class="loading-spinner"></div>
      <span class="loading-text">Procesando...</span>
    </div>
  </div>
  
  <!-- Scripts -->
  <script type="module">
    import DriverApp from '/mimi-transporte/js/driver-app.js';
    import supabaseService from '/mimi-transporte/js/supabase-client.js';
    
    // Exponer logout globalmente
    window.logout = () => supabaseService.logout();
    
    // Inicializar app
    const app = new DriverApp();
    app.init();
  </script>
</body>
</html>
