<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MIMI - Panel Chofer</title>
  <meta name="description" content="Panel de viajes para choferes de MIMI Transporte Infantil." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="MIMI - Panel Chofer" />
  <meta property="og:description" content="Gestioná viajes, estados, rutas y clientes desde el panel de chofer." />
  <meta property="og:url" content="https://paulomillanez1983.github.io/mimi-transporte/chofer.html" />
  <meta property="og:image" content="https://raw.githubusercontent.com/Paulomillanez1983/mimi-transporte/main/flyer-chofer.png" />
  <meta property="og:site_name" content="MIMI Transporte Infantil" />
  <meta property="og:locale" content="es_AR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MIMI - Panel Chofer" />
  <meta name="twitter:description" content="Panel operativo de choferes MIMI." />
  <meta name="twitter:image" content="https://raw.githubusercontent.com/Paulomillanez1983/mimi-transporte/main/flyer-chofer.png" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Paulomillanez1983/mimi-transporte/main/flyer-chofer.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    if (localStorage.getItem('choferLogueado') !== 'true') {
      window.location.href = 'login-chofer.html';
    }
  </script>

  <style>
    :root {
      --azul-oscuro: #1e3c72;
      --azul-primario: #1565c0;
      --verde: #4caf50;
      --naranja: #ff9800;
      --rojo: #f44336;
      --gris: #f5f7fa;
      --gris-2: #eef2f7;
      --texto: #1b1f2a;
      --texto-suave: #6b7280;
      --sombra: 0 8px 24px rgba(0,0,0,0.08);
      --radio-xl: 20px;
      --radio-lg: 16px;
      --radio-md: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      background: var(--gris);
      min-height: 100vh;
      color: var(--texto);
    }

    body {
      padding-bottom: 110px;
    }

    .header {
      background: linear-gradient(135deg, #101827 0%, #172554 100%);
      color: white;
      position: relative;
      z-index: 10;
      overflow: hidden;
      min-height: 220px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .header img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      object-position: center;
      display: block;
      filter: saturate(1.05);
    }

    .header-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(16,24,39,0.96), rgba(16,24,39,0.25), transparent);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 22px 18px 16px;
    }

    .header-top {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.9rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.14);
    }

    .logout-btn {
      padding: 11px 16px;
      border: none;
      border-radius: 14px;
      background: rgba(244,67,54,0.95);
      color: white;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(244,67,54,0.28);
      transition: transform 0.15s ease;
    }

    .logout-btn:active {
      transform: scale(0.97);
    }

    .header-overlay h1 {
      font-size: 1.45rem;
      font-weight: 900;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .header-overlay p {
      font-size: 0.92rem;
      opacity: 0.9;
      margin-top: 6px;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 16px;
      background: white;
      margin: -18px 15px 16px;
      border-radius: 22px;
      box-shadow: var(--sombra);
      position: relative;
      z-index: 11;
    }

    .stat {
      text-align: center;
      padding: 8px 6px;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .stat-number {
      font-size: 1.85rem;
      font-weight: 900;
      color: var(--azul-primario);
      letter-spacing: -0.03em;
    }

    .stat-label {
      font-size: 0.73rem;
      color: #6b7280;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-top: 3px;
    }

    .filtros {
      display: flex;
      gap: 10px;
      padding: 0 15px;
      margin-bottom: 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filtros::-webkit-scrollbar {
      display: none;
    }

    .filtro-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 999px;
      background: white;
      color: #667085;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .filtro-btn.activo {
      background: var(--azul-primario);
      color: white;
      box-shadow: 0 8px 20px rgba(21,101,192,0.28);
    }

    .viajes-lista {
      padding: 0 15px 20px;
    }

    .viaje-card {
      background: white;
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--sombra);
      border-left: 5px solid var(--azul-primario);
      animation: slideIn 0.32s ease-out;
      position: relative;
      overflow: hidden;
    }

    .viaje-card::after {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 110px;
      height: 110px;
      background: radial-gradient(circle, rgba(21,101,192,0.05), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .viaje-card.disponible { border-left-color: var(--naranja); }
    .viaje-card.asignado { border-left-color: #7c3aed; }
    .viaje-card.aceptado { border-left-color: var(--azul-primario); }
    .viaje-card.en-curso { border-left-color: #2196f3; }
    .viaje-card.completado { border-left-color: var(--verde); }
    .viaje-card.cancelado { border-left-color: var(--rojo); opacity: 0.82; }

    .viaje-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      margin-bottom: 14px;
    }

    .viaje-fecha {
      font-size: 0.78rem;
      color: #7b8190;
      font-weight: 800;
    }

    .viaje-estado {
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    .estado-disponible { background: #fff3e0; color: #e65100; }
    .estado-asignado { background: #ede9fe; color: #6d28d9; }
    .estado-aceptado { background: #e3f2fd; color: var(--azul-primario); }
    .estado-en-curso { background: #e3f2fd; color: #1976d2; }
    .estado-completado { background: #e8f5e9; color: #2e7d32; }
    .estado-cancelado { background: #ffebee; color: #c62828; }

    .viaje-ruta {
      margin-bottom: 14px;
    }

    .ruta-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.92rem;
    }

    .ruta-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.92rem;
      flex-shrink: 0;
    }

    .ruta-icon.origen { background: #e8f5e9; }
    .ruta-icon.destino { background: #ffebee; }

    .ruta-text {
      flex: 1;
      color: #2a2f3a;
      font-weight: 700;
      line-height: 1.35;
    }

    .viaje-info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 12px;
      background: var(--gris-2);
      border-radius: 16px;
      margin-bottom: 14px;
    }

    .info-item {
      text-align: center;
    }

    .info-valor {
      font-size: 1.04rem;
      font-weight: 900;
      color: var(--azul-oscuro);
      letter-spacing: -0.02em;
    }

    .info-label {
      font-size: 0.68rem;
      color: #7b8190;
      text-transform: uppercase;
      font-weight: 800;
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .viaje-cliente {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #fafafa;
      border-radius: 14px;
      margin-bottom: 14px;
      border: 1px solid #f0f0f0;
    }

    .cliente-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--azul-primario), var(--azul-oscuro));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      flex-shrink: 0;
      box-shadow: 0 6px 16px rgba(21,101,192,0.22);
    }

    .cliente-datos {
      flex: 1;
      min-width: 0;
    }

    .cliente-nombre {
      font-weight: 900;
      color: #111827;
      font-size: 0.96rem;
      line-height: 1.2;
    }

    .cliente-tel {
      font-size: 0.82rem;
      color: #6b7280;
      margin-top: 4px;
      word-break: break-word;
    }

    .viaje-acciones {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-accion {
      flex: 1;
      min-width: 120px;
      padding: 13px 12px;
      border: none;
      border-radius: 14px;
      font-size: 0.92rem;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.16s ease;
      text-decoration: none;
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    }

    .btn-accion:active {
      transform: scale(0.98);
    }

    .btn-aceptar { background: var(--verde); color: white; }
    .btn-rechazar-card { background: #ffebee; color: var(--rojo); border: 1px solid #ffcdd2; }
    .btn-iniciar { background: var(--azul-primario); color: white; }
    .btn-finalizar { background: var(--azul-oscuro); color: white; }
    .btn-maps { background: #e3f2fd; color: var(--azul-primario); }
    .btn-llamar { background: #e8f5e9; color: var(--verde); }
    .btn-whatsapp { background: #25d366; color: white; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #667085;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #e5e7eb;
      border-top-color: var(--azul-primario);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 70px 20px;
      color: #7b8190;
      background: white;
      border-radius: 24px;
      box-shadow: var(--sombra);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .refresh-btn {
      position: fixed;
      bottom: 22px;
      right: 20px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--azul-primario);
      color: white;
      border: none;
      font-size: 1.45rem;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(21, 101, 192, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .refresh-btn:active {
      transform: scale(0.95);
    }

    .refresh-btn.spinning {
      animation: spin 1s linear infinite;
    }

    .sound-btn {
      position: fixed;
      bottom: 92px;
      right: 20px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: white;
      color: var(--azul-primario);
      border: 2px solid var(--azul-primario);
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: all 0.18s ease;
    }

    .sound-btn.muted {
      background: #f5f5f5;
      color: #999;
      border-color: #ddd;
    }

    .sound-btn:active {
      transform: scale(0.95);
    }

    .new-trip-indicator {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: linear-gradient(135deg, var(--naranja), #f57c00);
      color: white;
      padding: 13px 24px;
      border-radius: 999px;
      font-weight: 900;
      box-shadow: 0 10px 26px rgba(255, 152, 0, 0.34);
      z-index: 9999;
      opacity: 0;
      transition: all 0.38s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .new-trip-indicator.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .new-trip-indicator::before {
      content: '🔔 ';
    }

    @keyframes slideUp {
      from { transform: translateY(90px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.82); box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.65); }
      70% { transform: scale(1); box-shadow: 0 0 0 22px rgba(255, 152, 0, 0); }
      100% { transform: scale(0.82); box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.75; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .modal-viaje {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 10000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 18px;
      backdrop-filter: blur(4px);
    }

    .modal-viaje.urgente .timer-bar {
      animation: pulse 0.55s infinite;
    }

    .timer-container {
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .timer-bar {
      height: 100%;
      background: linear-gradient(90deg, #4caf50 0%, #ff9800 50%, #f44336 100%);
      width: 100%;
      transition: width 1s linear;
    }

    .btn-rechazar {
      flex: 1;
      padding: 16px;
      border: 2px solid #ddd;
      background: white;
      border-radius: 16px;
      font-weight: 900;
      color: #666;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .btn-rechazar:hover {
      background: #ffebee;
      border-color: #f44336;
      color: #f44336;
    }

    .btn-aceptar-modal {
      flex: 2;
      padding: 16px;
      border: none;
      background: linear-gradient(135deg, #4caf50, #45a049);
      border-radius: 16px;
      font-weight: 900;
      color: white;
      font-size: 1.08rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(76,175,80,0.28);
      transition: all 0.18s ease;
    }

    .btn-aceptar-modal:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(76,175,80,0.35);
    }

    .pulse-icon {
      animation: pulse-ring 2s infinite;
    }

    .countdown-chip {
      margin-bottom: 12px;
      padding: 10px 12px;
      background: #fff3e0;
      border-radius: 12px;
      font-size: 0.86rem;
      font-weight: 900;
      color: #e65100;
    }

    @media (max-width: 420px) {
      .btn-accion {
        min-width: 100%;
      }

      .viaje-info {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <img src="https://raw.githubusercontent.com/Paulomillanez1983/mimi-transporte/main/flyer-chofer.png" alt="Panel Chofer MIMI" onerror="this.style.display='none';" />
    <div class="header-overlay">
      <div class="header-top">
        <div class="brand-badge">🚐 MIMI Driver</div>
        <button onclick="cerrarSesion()" class="logout-btn">🚪 Cerrar sesión</button>
      </div>
      <h1>Panel de Viajes</h1>
      <p>Chofer MIMI Transporte Infantil</p>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-number" id="statPendientes">0</div>
      <div class="stat-label">Pendientes</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="statHoy">0</div>
      <div class="stat-label">Hoy</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="filtros">
    <button class="filtro-btn activo" data-filtro="TODOS" onclick="filtrar('TODOS')">Todos</button>
    <button class="filtro-btn" data-filtro="DISPONIBLE" onclick="filtrar('DISPONIBLE')">Pendientes</button>
    <button class="filtro-btn" data-filtro="ACEPTADO" onclick="filtrar('ACEPTADO')">Aceptados</button>
    <button class="filtro-btn" data-filtro="EN_CURSO" onclick="filtrar('EN_CURSO')">En curso</button>
    <button class="filtro-btn" data-filtro="COMPLETADO" onclick="filtrar('COMPLETADO')">Completados</button>
  </div>

  <!-- LISTA VIAJES -->
  <div class="viajes-lista" id="listaViajes">
    <div class="loading">
      <div class="spinner"></div>
      <p>Cargando viajes...</p>
    </div>
  </div>

  <!-- INDICADOR NUEVO VIAJE -->
  <div class="new-trip-indicator" id="newTripIndicator">¡Nuevo viaje disponible!</div>

  <!-- BOTONES FLOTANTES -->
  <button class="sound-btn" id="soundBtn" onclick="toggleSound()" title="Activar/desactivar sonido">🔔</button>
  <button class="refresh-btn" id="btnRefresh" onclick="cargarViajesSeguro()">🔄</button>

  <!-- MODAL SOLICITUD ENTRANTE -->
  <div id="incomingModal" class="modal-viaje">
    <div id="incomingModalCard" style="background: white; border-radius: 28px; width: 100%; max-width: 420px; overflow: hidden; box-shadow: 0 24px 70px rgba(0,0,0,0.42); animation: slideUp 0.38s ease-out;">
      <div class="timer-container">
        <div id="timerBar" class="timer-bar"></div>
      </div>

      <div style="padding: 24px;">
        <div style="text-align: center; margin-bottom: 20px;">
          <div class="pulse-icon" style="width: 102px; height: 102px; background: linear-gradient(135deg, #ff9800, #f57c00); border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 3rem;">🚐</div>
          <h2 style="font-size: 1.55rem; color: #1a1a2e; margin-bottom: 8px; font-weight: 900;">¡Nuevo viaje!</h2>
          <p style="color: #666; font-size: 1rem;">Decidí en <span id="timerText" style="font-weight: 900; color: #ff9800; font-size: 1.2rem;">30</span> segundos</p>
        </div>

        <div id="incomingDetails" style="background: #f5f7fa; border-radius: 18px; padding: 16px; margin-bottom: 20px;">
          <!-- Se llena dinámicamente -->
        </div>

        <div style="display: flex; gap: 12px;">
          <button class="btn-rechazar" onclick="rechazarViaje()">❌ Rechazar</button>
          <button class="btn-aceptar-modal" onclick="aceptarViaje()">✓ Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // CONFIGURACIÓN SUPABASE
    // ==========================================
const SUPABASE_URL = "https://xrphpqmutvadjrucqicn.supabase.co";
const SUPABASE_KEY = "sb_publishable_ZoEziWmg0PUy2lNVsiw1XA_zO40DAoq";

// Cliente oficial Supabase para Realtime
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: false,
    autoRefreshToken: false
  },
  realtime: {
    params: {
      eventsPerSecond: 10
    }
  }
});

window.supabaseClient = supabaseClient;
<script>
  // ==========================================
  // CONFIGURACIÓN SUPABASE
  // ==========================================
  const SUPABASE_URL = "https://xrphpqmutvadjrucqicn.supabase.co";

        Object.entries(options.eq).forEach(([col, val]) => {
          url += `&${col}=eq.${encodeURIComponent(val)}`;
        });
      }

      if (options.neq) {
        Object.entries(options.neq).forEach(([col, val]) => {
          url += `&${col}=neq.${encodeURIComponent(val)}`;
        });
      }

      if (Array.isArray(options.filters)) {
        options.filters.forEach(filter => {
          url += `&${filter}`;
        });
      }

      if (options.or) {
        url += `&or=(${options.or})`;
      }

      if (options.order) {
        url += `&order=${encodeURIComponent(options.order)}`;
      }

      if (options.limit) {
        url += `&limit=${options.limit}`;
      }

      const response = await fetch(url, {
        method: 'GET',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));

    const SoundSystem = {
      audioContext: null,

      async init() {

        }

        return this.enabled;

        if (!this.enabled || !this.audioContext) return;
        const ctx = this.audioContext;
        const now = ctx.currentTime;

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(440, now + 0.3);

        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);

        osc.start(now);
        osc.stop(now + 0.4);

        const ctx = this.audioContext;

        const gain = ctx.createGain();

        osc.connect(gain);

        gain.gain.linearRampToValueAtTime(0, now + 0.4);

        osc.start(now);

    function obtenerTiempoRestante(viaje) {

    function actualizarStats() {
      const hoy = new Date().toDateString();

      const pendientes = viajesData.filter(v => normalizarEstado(v.estado) === 'DISPONIBLE').length;

      const deHoy = viajesData.filter(v => {
        const fecha = v.fecha || v.fechaHora || v.created_at;
        if (!fecha) return false;
        return new Date(fecha).toDateString() === hoy;
      }).length;

      document.getElementById('statPendientes').textContent = pendientes;
      document.getElementById('statHoy').textContent = deHoy;
      document.getElementById('statTotal').textContent = viajesData.length;

    function filtrar(estado) {
      filtroActual = estado;

      document.querySelectorAll('.filtro-btn').forEach(btn => {
        btn.classList.remove('activo');
        if (btn.dataset.filtro === estado) {
          btn.classList.add('activo');

      renderizarViajes();

    function renderizarViajes() {
      const container = document.getElementById('listaViajes');
      limpiarViajesExpiradosLocales();

      let viajes = [...viajesData];

      if (filtroActual !== 'TODOS') {
        viajes = viajes.filter(v => normalizarEstado(v.estado) === filtroActual);
      }

      viajes.sort((a, b) => {
        const orden = {
          'DISPONIBLE': 0,
          'ASIGNADO': 1,
          'ACEPTADO': 2,
          'EN_CURSO': 3,
          'COMPLETADO': 4,
          'CANCELADO': 5
        };

        const estadoA = normalizarEstado(a.estado);
        const estadoB = normalizarEstado(b.estado);

        if ((orden[estadoA] ?? 99) !== (orden[estadoB] ?? 99)) {
          return (orden[estadoA] ?? 99) - (orden[estadoB] ?? 99);
        }

        return new Date(b.fecha || b.fechaHora || b.created_at || 0) - new Date(a.fecha || a.fechaHora || a.created_at || 0);
      });

      if (viajes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🚗</div>
            <p>No hay viajes ${filtroActual !== 'TODOS' ? 'en este estado' : ''}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = viajes.map(v => crearCardViaje(v)).join('');
    }

    function crearCardViaje(v) {
      const estado = normalizarEstado(v.estado || 'DISPONIBLE');
      const estadoClass = estado.toLowerCase().replace(/_/g, '-');
      const fecha = new Date(v.fecha || v.fechaHora || v.created_at || Date.now());

      const fechaStr = fecha.toLocaleDateString('es-AR', {
        weekday: 'short',
        day: 'numeric',
        month: 'short',
        hour: '2-digit',
        minute: '2-digit'
      });

      const inicial = v.cliente ? String(v.cliente).charAt(0).toUpperCase() : '?';

      let acciones = '';
      let timeoutHtml = '';

      if (estado === 'DISPONIBLE') {
        const restante = obtenerTiempoRestante(v);
        const min = Math.floor(restante / 60);
        const seg = restante % 60;

        timeoutHtml = `
          <div class="countdown-chip">
            ⏳ Disponible por: ${String(min).padStart(2, '0')}:${String(seg).padStart(2, '0')}
          </div>
        `;

        acciones = `
          <button class="btn-accion btn-aceptar" onclick="tomarViaje('${escaparHTML(v.id)}')">✓ Aceptar</button>
          <button class="btn-accion btn-rechazar-card" onclick="rechazarDisponible('${escaparHTML(v.id)}')">✕ Rechazar</button>
          <button class="btn-accion btn-maps" onclick="abrirMaps('${escaparHTML(v.origen || '')}', '${escaparHTML(v.destino || '')}')">🗺️ Maps</button>
        `;
      } else if (estado === 'ACEPTADO') {
        acciones = `
          <button class="btn-accion btn-iniciar" onclick="cambiarEstado('${escaparHTML(v.id)}', 'EN_CURSO')">🚀 Iniciar</button>
          <a href="tel:${escaparHTML(v.telefono || '')}" class="btn-accion btn-llamar">📞 Llamar</a>
          <button class="btn-accion btn-maps" onclick="abrirMaps('${escaparHTML(v.origen || '')}', '${escaparHTML(v.destino || '')}')">🗺️ Ruta</button>
        `;
      } else if (estado === 'EN_CURSO') {
        const telWA = String(v.telefono || '').replace(/[^\d]/g, '');
        acciones = `
          <button class="btn-accion btn-finalizar" onclick="finalizarViaje('${escaparHTML(v.id)}')">✅ Finalizar</button>
          <a href="https://wa.me/${telWA}" target="_blank" rel="noopener noreferrer" class="btn-accion btn-whatsapp">💬 WA</a>
          <button class="btn-accion btn-maps" onclick="abrirMaps('${escaparHTML(v.origen || '')}', '${escaparHTML(v.destino || '')}')">🗺️ Navegar</button>
        `;
      } else {
        acciones = `
          <button class="btn-accion btn-maps" onclick="abrirMaps('${escaparHTML(v.origen || '')}', '${escaparHTML(v.destino || '')}')">🗺️ Ver ruta</button>
        `;
      }

      return `
        <div class="viaje-card ${estadoClass}">
          <div class="viaje-header">
            <span class="viaje-fecha">${escaparHTML(fechaStr)}</span>
            <span class="viaje-estado estado-${estadoClass}">${escaparHTML(estado.replace('_', ' '))}</span>
          </div>

          <div class="viaje-cliente">
            <div class="cliente-avatar">${escaparHTML(inicial)}</div>
            <div class="cliente-datos">
              <div class="cliente-nombre">${escaparHTML(v.cliente || 'Sin nombre')}</div>
              <div class="cliente-tel">📱 ${escaparHTML(v.telefono || 'Sin teléfono')}</div>
            </div>
          </div>

          <div class="viaje-ruta">
            <div class="ruta-item">
              <div class="ruta-icon origen">📍</div>
              <div class="ruta-text">${escaparHTML(v.origen || '')}</div>
            </div>
            <div class="ruta-item">
              <div class="ruta-icon destino">🎯</div>
              <div class="ruta-text">${escaparHTML(v.destino || '')}</div>
            </div>
          </div>

          <div class="viaje-info">
            <div class="info-item">
              <div class="info-valor">$${Number(v.precio || 0).toLocaleString('es-AR')}</div>
              <div class="info-label">Precio</div>
            </div>
            <div class="info-item">
              <div class="info-valor">${escaparHTML(v.km || 0)}km</div>
              <div class="info-label">Distancia</div>
            </div>
            <div class="info-item">
              <div class="info-valor">${escaparHTML(v.tipo || 'N/D')}</div>
              <div class="info-label">Servicio</div>
            </div>
          </div>

          ${timeoutHtml}

          ${v.notas ? `<div style="font-size:0.86rem;color:#666;margin-bottom:12px;padding:10px 12px;background:#fffde7;border-radius:12px;font-weight:700;">📝 ${escaparHTML(v.notas)}</div>` : ''}

          <div class="viaje-acciones">${acciones}</div>
        </div>
      `;
    }

    // ==========================================
    // ACCIONES DE VIAJE
    // ==========================================
async function cambiarEstado(id, nuevoEstado) {
  if (!id) {
    alert('ID inválido');
    return;
  }

  const choferId = obtenerChoferId();
  const now = new Date().toISOString();

  const payload = {
    estado: nuevoEstado,
    updated_at: now
  };

  if (nuevoEstado === 'ACEPTADO') {
    payload.chofer_id = choferId;
    payload.asignado_a = choferId;
    payload.aceptado_at = now;
  }

if (nuevoEstado === 'EN_CURSO') {
  payload.updated_at = now;
}

if (nuevoEstado === 'COMPLETADO') {
  payload.completado_at = now;
}
  try {
    await supabase.updateById('viajes', id, payload);
    SoundSystem.playSuccess();
    mostrarNotificacion('Estado actualizado', 'success');
    await cargarViajesSeguro();
  } catch (err) {
    alert('Error: ' + err.message);
    console.error(err);
  }
}
async function rechazarDisponible(id) {
  const choferId = obtenerChoferId();

  if (!id) {
    mostrarNotificacion('ID de viaje inválido', 'error');
    return;
  }

  if (!confirm('¿Querés rechazar este viaje?')) return;

  try {
    const viajeActual = viajesData.find(v => v.id === id);

    if (!viajeActual) {
      mostrarNotificacion('El viaje ya no está disponible', 'warning');
      await cargarViajesSeguro();
      return;
    }

    const estadoActual = normalizarEstado(viajeActual.estado);

    if (estadoActual !== 'DISPONIBLE') {
      mostrarNotificacion('Este viaje ya no está disponible', 'warning');
      await cargarViajesSeguro();
      return;
    }

    const actualizado = await supabase.updateById('viajes', id, {
      rechazado_por: choferId,
      rechazado_at: new Date().toISOString()
    }, {
      estado: 'DISPONIBLE'
    });

    if (!actualizado || actualizado.length === 0) {
      mostrarNotificacion('El viaje ya fue tomado por otro chofer', 'warning');
      await cargarViajesSeguro();
      return;
    }

    viajesRechazadosLocalmente.add(id);
    viajesData = viajesData.filter(v => v.id !== id);

    SoundSystem.playNotification();
    mostrarNotificacion('Viaje rechazado', 'info');

    renderizarViajes();
    actualizarStats();

  } catch (err) {
    console.error('Error al rechazar viaje disponible:', err);
    mostrarNotificacion('Error al rechazar: ' + err.message, 'error');
  }
}
    async function finalizarViaje(id) {
  const notas = prompt('¿Observaciones del viaje? (opcional)');

  try {
    await supabase.updateById('viajes', id, {
      estado: 'COMPLETADO',
      notas: notas || null,
      completado_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    });

    SoundSystem.playSuccess();
    mostrarNotificacion('Viaje finalizado', 'success');
    await cargarViajesSeguro();
  } catch (err) {
    alert('Error al finalizar: ' + err.message);
    console.error(err);
  }
}
    // ==========================================
    // INICIALIZACIÓN
    // ==========================================
    let realtimeChannel = null;

function iniciarRealtimeViajes() {
  try {
    if (!window.supabaseClient) {
      console.warn('No hay cliente realtime disponible');
      return;
    }

    if (realtimeChannel) {
      window.supabaseClient.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }

    let refreshTimeout = null;

    realtimeChannel = window.supabaseClient
      .channel('viajes-live')
      .on(
        'postgres_changes',
        {
          event: '*',
          schema: 'public',
          table: 'viajes'
        },
        (payload) => {
          console.log('🔄 Cambio realtime en viajes:', payload);

          clearTimeout(refreshTimeout);
          refreshTimeout = setTimeout(() => {
            cargarViajesSeguro();
          }, 350);
        }
      )
      .subscribe((status) => {
        console.log('📡 Realtime viajes:', status);
      });

  } catch (err) {
    console.error('Error iniciando realtime:', err);
  }
}        
document.addEventListener('DOMContentLoaded', async () => {
  await cargarViajesSeguro();
  iniciarRealtimeViajes();

  // Inicializar audio en primer click
  document.body.addEventListener('click', async () => {
    if (!SoundSystem.audioContext) {
      await SoundSystem.init();
    }
  }, { once: true });

  // Click fuera del modal
  const modal = document.getElementById('incomingModal');
  const card = document.getElementById('incomingModalCard');

  if (modal && card) {
    modal.addEventListener('click', (e) => {
      if (e.target.id === 'incomingModal') {
        card.style.animation = 'shake 0.4s ease-in-out';
        setTimeout(() => {
          card.style.animation = 'slideUp 0.38s ease-out';
        }, 400);
        SoundSystem.vibrate([30, 30, 30]);
      }
    });
  }

  // Re-render local solo visual (countdowns)
  setInterval(() => {
    if (!document.hidden) {
      renderizarViajes();
      actualizarStats();
    }
  }, 1000);
});
    window.addEventListener('beforeunload', async () => {
  try {
    if (realtimeChannel && window.supabaseClient) {
      await window.supabaseClient.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }
  } catch (e) {
    console.warn('No se pudo limpiar realtime:', e);
  }
});
  </script>
