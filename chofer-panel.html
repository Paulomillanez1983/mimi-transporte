<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MIMI Driver</title>
  
  <!-- MapLibre -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.js"></script>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-primary: #000000;
      --bg-secondary: #121212;
      --bg-card: #1C1C1E;
      --accent: #276EF1;
      --accent-light: #3E8AFF;
      --success: #05944F;
      --warning: #FFAD0D;
      --danger: #E11900;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --border: #2C2C2E;
    }

    html, body {
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      padding-bottom: 100px;
    }

    /* HEADER UBER-STYLE */
    .header {
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .brand-text h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .brand-text span {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .logout-btn {
      background: var(--bg-card);
      color: var(--danger);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:active {
      transform: scale(0.95);
      opacity: 0.8;
    }

    /* DRIVER STATUS CARD */
    .driver-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--border);
    }

    .driver-avatar {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .driver-info {
      flex: 1;
    }

    .driver-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .driver-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--success);
    }

    .driver-status::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-badge {
      background: var(--success);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 16px;
      margin: 0 16px;
    }

    .stat {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      padding: 0 16px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* TRIP CARDS */
    .trips-list {
      padding: 0 16px;
    }

    .trip-card {
      background: var(--bg-card);
      border-radius: 20px;
      margin-bottom: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .trip-card::before {
      content: '';
      display: block;
      height: 4px;
      background: var(--accent);
    }

    .trip-card.disponible::before { background: var(--warning); }
    .trip-card.aceptado::before { background: var(--accent); }
    .trip-card.en-curso::before { background: var(--accent-light); }
    .trip-card.completado::before { background: var(--success); }
    .trip-card.cancelado::before { background: var(--danger); }

    .trip-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .trip-date {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .trip-status {
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-disponible { background: rgba(255, 173, 13, 0.15); color: var(--warning); }
    .status-aceptado { background: rgba(39, 110, 241, 0.15); color: var(--accent); }
    .status-en-curso { background: rgba(62, 138, 255, 0.15); color: var(--accent-light); }
    .status-completado { background: rgba(5, 148, 79, 0.15); color: var(--success); }
    .status-cancelado { background: rgba(225, 25, 0, 0.15); color: var(--danger); }

    .trip-body {
      padding: 16px;
    }

    .client-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .client-avatar {
      width: 44px;
      height: 44px;
      background: var(--bg-secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: var(--accent);
    }

    .client-info h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .client-info p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ROUTE */
    .route {
      margin: 16px 0;
    }

    .route-stop {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .route-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .route-dot.pickup { background: var(--success); box-shadow: 0 0 0 4px rgba(5, 148, 79, 0.2); }
    .route-dot.dropoff { background: var(--danger); box-shadow: 0 0 0 4px rgba(225, 25, 0, 0.2); }

    .route-line {
      width: 2px;
      height: 24px;
      background: var(--border);
      margin-left: 5px;
      margin-bottom: 4px;
    }

    .route-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
      color: var(--text-primary);
    }

    /* MAP */
    .map-container {
      height: 180px;
      background: var(--bg-secondary);
      border-radius: 12px;
      margin: 16px 0;
      overflow: hidden;
      position: relative;
    }

    .map-container .maplibregl-map {
      width: 100%;
      height: 100%;
    }

    .map-placeholder {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* TRIP INFO */
    .trip-info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .info-item {
      text-align: center;
    }

    .info-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .info-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 600;
    }

    /* COUNTDOWN */
    .countdown {
      background: rgba(255, 173, 13, 0.1);
      border: 1px solid rgba(255, 173, 13, 0.3);
      color: var(--warning);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    /* ACTIONS */
    .trip-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--success);
      color: white;
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: rgba(225, 25, 0, 0.1);
      color: var(--danger);
      border: 1px solid rgba(225, 25, 0, 0.3);
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
    }

    /* FLOATING BUTTONS */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(39, 110, 241, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: all 0.3s;
    }

    .fab.spinning {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      flex-direction: column;
      justify-content: flex-end;
      backdrop-filter: blur(10px);
    }

    .modal.active { display: flex; }

    .modal-content {
      background: var(--bg-card);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      animation: slideUpModal 0.3s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideUpModal {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .modal-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--warning), #FF9500);
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      animation: pulse-ring 2s infinite;
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(255, 173, 13, 0.4); }
      70% { box-shadow: 0 0 0 20px rgba(255, 173, 13, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 173, 13, 0); }
    }

    .timer-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .timer-progress {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--warning), var(--danger));
      width: 100%;
      transition: width 1s linear;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-actions .btn {
      padding: 16px;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    /* NOTIFICATION */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--bg-card);
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      z-index: 10000;
      opacity: 0;
      transition: all 0.3s;
      border: 1px solid var(--border);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); }
    .toast.warning { border-color: var(--warning); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-icon">🚐</div>
        <div class="brand-text">
          <h1>MIMI Driver</h1>
          <span>Transporte Escolar</span>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">🚪 Salir</button>
    </div>
    
    <div class="driver-card">
      <div class="driver-avatar">👤</div>
      <div class="driver-info">
        <div class="driver-name" id="driverName">Chofer MIMI</div>
        <div class="driver-status">Online</div>
      </div>
      <span class="status-badge">Activo</span>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-number" id="statPendientes">0</div>
      <div class="stat-label">Pendientes</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="statHoy">0</div>
      <div class="stat-label">Hoy</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" data-filter="TODOS" onclick="filter('TODOS')">Todos</button>
    <button class="filter-btn" data-filter="DISPONIBLE" onclick="filter('DISPONIBLE')">Pendientes</button>
    <button class="filter-btn" data-filter="ACEPTADO" onclick="filter('ACEPTADO')">Aceptados</button>
    <button class="filter-btn" data-filter="EN_CURSO" onclick="filter('EN_CURSO')">En curso</button>
    <button class="filter-btn" data-filter="COMPLETADO" onclick="filter('COMPLETADO')">Completados</button>
  </div>

  <!-- TRIPS LIST -->
  <div class="trips-list" id="tripsList">
    <div class="loading">
      <div class="spinner"></div>
      <p style="color: var(--text-secondary);">Cargando viajes...</p>
    </div>
  </div>

  <!-- FLOATING BUTTON -->
  <button class="fab" id="refreshBtn" onclick="loadTrips()">🔄</button>

  <!-- MODAL -->
  <div class="modal" id="incomingModal">
    <div class="modal-content">
      <div class="timer-bar">
        <div class="timer-progress" id="timerProgress"></div>
      </div>
      
      <div class="modal-header">
        <div class="modal-icon">🚐</div>
        <h2 style="font-size: 24px; margin-bottom: 8px;">¡Nuevo viaje!</h2>
        <p style="color: var(--text-secondary);">Decidí en <span id="timerText" style="color: var(--warning); font-weight: 800;">30</span> segundos</p>
      </div>

      <div id="modalDetails"></div>

      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="rejectTrip()" style="flex: 1;">Rechazar</button>
        <button class="btn btn-primary" onclick="acceptTrip()" style="flex: 2;">Aceptar viaje</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ==========================================
    // CONFIG
    // ==========================================
    const SUPABASE_URL = "https://xrphpqmutvadjrucqicn.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhycGhwcW11dHZhZGpydWNxaWNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDY5ODgsImV4cCI6MjA4OTk4Mjk4OH0.0nsO3GBevQzMBCvne17I9L5_Yi4VPYiWedxyntLr4uM"; // REEMPLAZAR CON TU ANON KEY REAL
    
    let supabaseClient = null;
    let supabaseRest = null;
    let tripsData = [];
    let pendingTrip = null;
    let timerInterval = null;
    let currentFilter = 'TODOS';
    let maps = {};
    let userInteracted = false;

    // ==========================================
    // INIT
    // ==========================================
    function initSupabase() {
      if (typeof window.supabase === 'undefined') return false;
      
      try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
          auth: { persistSession: false, autoRefreshToken: false }
        });

        supabaseRest = {
          async select(table, opts = {}) {
            let q = supabaseClient.from(table).select(opts.columns || '*');
            if (opts.eq) Object.entries(opts.eq).forEach(([k,v]) => q = q.eq(k,v));
            if (opts.neq) Object.entries(opts.neq).forEach(([k,v]) => q = q.neq(k,v));
            if (opts.order) {
              const [col, dir] = opts.order.split('.');
              q = q.order(col, { ascending: dir === 'asc' });
            }
            if (opts.limit) q = q.limit(opts.limit);
            const { data, error } = await q;
            if (error) throw error;
            return data || [];
          },
          async update(table, id, data) {
            const { data: res, error } = await supabaseClient
              .from(table)
              .update({ ...data, updated_at: new Date().toISOString() })
              .eq('id', id)
              .select();
            if (error) throw error;
            return res;
          }
        };
        return true;
      } catch (e) {
        console.error('Supabase init error:', e);
        return false;
      }
    }

    // ==========================================
    // MAPS
    // ==========================================
    function initMap(tripId, origen, destino) {
      if (!origen?.lat || !destino?.lat) return;
      
      const container = document.getElementById(`map-${tripId}`);
      if (!container || maps[tripId]) return;

      try {
        const map = new maplibregl.Map({
          container: container,
          style: 'https://tiles.stadiamaps.com/styles/alidade_smooth_dark.json',
          center: [(origen.lng + destino.lng) / 2, (origen.lat + destino.lat) / 2],
          zoom: 13,
          attributionControl: false
        });

        map.on('load', () => {
          new maplibregl.Marker({ color: '#05944F' })
            .setLngLat([origen.lng, origen.lat])
            .addTo(map);
          
          new maplibregl.Marker({ color: '#E11900' })
            .setLngLat([destino.lng, destino.lat])
            .addTo(map);

          const bounds = new maplibregl.LngLatBounds()
            .extend([origen.lng, origen.lat])
            .extend([destino.lng, destino.lat]);
          map.fitBounds(bounds, { padding: 50 });
        });

        maps[tripId] = map;
      } catch (e) {
        console.error('Map error:', e);
      }
    }

    // ==========================================
    // SOUND
    // ==========================================
    const Sound = {
      ctx: null,
      enabled: false,
      
      async init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') await this.ctx.resume();
        this.enabled = true;
      },

      play(type) {
        if (!this.enabled || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        const now = this.ctx.currentTime;
        
        if (type === 'new') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(880, now);
          osc.frequency.exponentialRampToValueAtTime(440, now + 0.3);
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
          osc.start(now);
          osc.stop(now + 0.4);
        } else if (type === 'success') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523, now);
          osc.frequency.setValueAtTime(659, now + 0.1);
          osc.frequency.setValueAtTime(784, now + 0.2);
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.linearRampToValueAtTime(0, now + 0.4);
          osc.start(now);
          osc.stop(now + 0.4);
        }
      },

      vibrate(pattern) {
        if (navigator.vibrate && userInteracted) navigator.vibrate(pattern);
      }
    };

    // ==========================================
    // UI HELPERS
    // ==========================================
    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function normalizeState(s) {
      return String(s || '').toUpperCase().replace(/[-\s]/g, '_');
    }

    function escapeHtml(t) {
      return String(t || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]));
    }

    function getDriverId() {
      return localStorage.getItem('choferUsuario') || 'driver_001';
    }

    function logout() {
      localStorage.clear();
      location.href = 'login-chofer.html';
    }

    // ==========================================
    // DATA
    // ==========================================
    async function loadTrips() {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('spinning');

      try {
        const driverId = getDriverId();
        
        // Fetch all trip types in parallel
        const [disponibles, aceptados, enCurso, completados] = await Promise.all([
          supabaseRest.select('viajes', { eq: { estado: 'DISPONIBLE' }, order: 'created_at.desc' }),
          supabaseRest.select('viajes', { eq: { estado: 'ACEPTADO', chofer_id: driverId }, order: 'aceptado_at.desc' }),
          supabaseRest.select('viajes', { eq: { estado: 'EN_CURSO', chofer_id: driverId }, order: 'updated_at.desc' }),
          supabaseRest.select('viajes', { eq: { estado: 'COMPLETADO', chofer_id: driverId }, order: 'completado_at.desc', limit: 20 })
        ]);

        // Check for new assigned trips
        const asignados = await supabaseRest.select('viajes', { 
          eq: { estado: 'ASIGNADO', chofer_id: driverId }, 
          order: 'asignado_at.desc',
          limit: 1 
        });

        if (asignados[0] && !pendingTrip) {
          showIncomingModal(asignados[0]);
        }

        // Merge and deduplicate
        const map = new Map();
        [...disponibles, ...aceptados, ...enCurso, ...completados].forEach(t => {
          if (t?.id) map.set(t.id, t);
        });
        
        tripsData = Array.from(map.values());
        
        // Check for new available trips
        const newTrips = tripsData.filter(t => 
          normalizeState(t.estado) === 'DISPONIBLE' && 
          !window.seenTrips?.has(t.id)
        );
        
        if (newTrips.length > 0) {
          Sound.play('new');
          Sound.vibrate([100, 50, 100]);
          newTrips.forEach(t => {
            if (!window.seenTrips) window.seenTrips = new Set();
            window.seenTrips.add(t.id);
          });
        }

        renderTrips();
        updateStats();

      } catch (err) {
        console.error(err);
        document.getElementById('tripsList').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <p>Error al cargar viajes</p>
            <button class="btn btn-primary" onclick="loadTrips()" style="margin-top: 16px;">Reintentar</button>
          </div>
        `;
      } finally {
        btn.classList.remove('spinning');
      }
    }

    function updateStats() {
      const hoy = new Date().toDateString();
      document.getElementById('statPendientes').textContent = 
        tripsData.filter(t => normalizeState(t.estado) === 'DISPONIBLE').length;
      document.getElementById('statHoy').textContent = 
        tripsData.filter(t => new Date(t.fecha || t.created_at).toDateString() === hoy).length;
      document.getElementById('statTotal').textContent = tripsData.length;
    }

    function filter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === f);
      });
      renderTrips();
    }

    // ==========================================
    // RENDER
    // ==========================================
    function renderTrips() {
      const container = document.getElementById('tripsList');
      
      let trips = tripsData;
      if (currentFilter !== 'TODOS') {
        trips = trips.filter(t => normalizeState(t.estado) === currentFilter);
      }

      trips.sort((a, b) => {
        const order = { 'DISPONIBLE': 0, 'ASIGNADO': 1, 'ACEPTADO': 2, 'EN_CURSO': 3, 'COMPLETADO': 4 };
        const diff = (order[normalizeState(a.estado)] || 99) - (order[normalizeState(b.estado)] || 99);
        if (diff !== 0) return diff;
        return new Date(b.fecha || b.created_at) - new Date(a.fecha || a.created_at);
      });

      if (trips.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🚗</div>
            <p>No hay viajes ${currentFilter !== 'TODOS' ? 'en este estado' : ''}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = trips.map(t => createTripCard(t)).join('');
      
      // Initialize maps after render
      setTimeout(() => {
        trips.forEach(t => {
          if (t.origen_lat && t.destino_lat) {
            initMap(t.id, 
              { lat: t.origen_lat, lng: t.origen_lng },
              { lat: t.destino_lat, lng: t.destino_lng }
            );
          }
        });
      }, 100);
    }

    function createTripCard(t) {
      const estado = normalizeState(t.estado);
      const estadoClass = estado.toLowerCase();
      const fecha = new Date(t.fecha || t.created_at).toLocaleString('es-AR', {
        weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
      });
      
      const hasCoords = t.origen_lat && t.destino_lat;
      
      let actions = '';
      let countdown = '';
      
      if (estado === 'DISPONIBLE') {
        const exp = new Date(t.created_at).getTime() + 2*60*1000;
        const rest = Math.max(0, Math.floor((exp - Date.now()) / 1000));
        const min = Math.floor(rest / 60);
        const seg = rest % 60;
        
        countdown = `<div class="countdown">⏱️ Disponible: ${min}:${seg.toString().padStart(2,'0')}</div>`;
        actions = `
          <button class="btn btn-primary" onclick="acceptTripId('${t.id}')">✓ Aceptar</button>
          <button class="btn btn-danger" onclick="rejectTripId('${t.id}')">✕ Rechazar</button>
        `;
      } else if (estado === 'ACEPTADO') {
        actions = `
          <button class="btn btn-primary" onclick="startTrip('${t.id}')">🚀 Iniciar</button>
          <a href="tel:${t.telefono}" class="btn btn-secondary">📞 Llamar</a>
        `;
      } else if (estado === 'EN_CURSO') {
        const wa = String(t.telefono).replace(/\D/g, '');
        actions = `
          <button class="btn btn-primary" onclick="finishTrip('${t.id}')">✅ Finalizar</button>
          <a href="https://wa.me/${wa}" target="_blank" class="btn btn-whatsapp">💬 WhatsApp</a>
        `;
      } else {
        actions = `<button class="btn btn-secondary" onclick="openMaps('${t.origen}', '${t.destino}')">🗺️ Maps</button>`;
      }

      return `
        <div class="trip-card ${estadoClass}">
          <div class="trip-header">
            <span class="trip-date">${escapeHtml(fecha)}</span>
            <span class="trip-status status-${estadoClass}">${estado.replace('_', ' ')}</span>
          </div>
          
          <div class="trip-body">
            <div class="client-row">
              <div class="client-avatar">${escapeHtml((t.cliente || '?')[0])}</div>
              <div class="client-info">
                <h3>${escapeHtml(t.cliente || 'Sin nombre')}</h3>
                <p>📱 ${escapeHtml(t.telefono || 'Sin teléfono')}</p>
              </div>
            </div>

            <div class="route">
              <div class="route-stop">
                <div class="route-dot pickup"></div>
                <div class="route-text">${escapeHtml(t.origen)}</div>
              </div>
              <div class="route-line"></div>
              <div class="route-stop">
                <div class="route-dot dropoff"></div>
                <div class="route-text">${escapeHtml(t.destino)}</div>
              </div>
            </div>

            ${hasCoords ? `<div class="map-container"><div id="map-${t.id}"></div></div>` : ''}

            <div class="trip-info">
              <div class="info-item">
                <div class="info-value">$${Number(t.precio || 0).toLocaleString('es-AR')}</div>
                <div class="info-label">Precio</div>
              </div>
              <div class="info-item">
                <div class="info-value">${t.km || 0} km</div>
                <div class="info-label">Distancia</div>
              </div>
              <div class="info-item">
                <div class="info-value">${escapeHtml(t.tipo || 'Standard')}</div>
                <div class="info-label">Servicio</div>
              </div>
            </div>

            ${countdown}
            ${t.notas ? `<p style="color: var(--text-secondary); font-size: 13px; margin-bottom: 16px;">📝 ${escapeHtml(t.notas)}</p>` : ''}
            
            <div class="trip-actions">${actions}</div>
          </div>
        </div>
      `;
    }

    // ==========================================
    // MODAL
    // ==========================================
    function showIncomingModal(trip) {
      pendingTrip = trip;
      const modal = document.getElementById('incomingModal');
      const details = document.getElementById('modalDetails');
      
      details.innerHTML = `
        <div style="background: var(--bg-secondary); border-radius: 16px; padding: 20px; margin-bottom: 16px;">
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
            <div style="width: 56px; height: 56px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700;">
              ${escapeHtml((trip.cliente || '?')[0])}
            </div>
            <div>
              <div style="font-weight: 700; font-size: 18px;">${escapeHtml(trip.cliente)}</div>
              <div style="color: var(--text-secondary); font-size: 14px;">📱 ${escapeHtml(trip.telefono)}</div>
            </div>
          </div>
          
          <div style="display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; font-size: 15px;">
            <span style="color: var(--success);">●</span>
            <span>${escapeHtml(trip.origen)}</span>
          </div>
          <div style="display: flex; align-items: flex-start; gap: 8px; font-size: 15px;">
            <span style="color: var(--danger);">●</span>
            <span>${escapeHtml(trip.destino)}</span>
          </div>
          
          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);">
            <div style="text-align: center;">
              <div style="font-size: 20px; font-weight: 800; color: var(--accent);">$${Number(trip.precio).toLocaleString('es-AR')}</div>
              <div style="font-size: 11px; color: var(--text-secondary);">Precio</div>
            </div>
            <div style="text-align: center;">
              <div style="font-size: 20px; font-weight: 800; color: var(--accent);">${trip.km}km</div>
              <div style="font-size: 11px; color: var(--text-secondary);">Distancia</div>
            </div>
            <div style="text-align: center;">
              <div style="font-size: 18px; font-weight: 800; color: var(--accent);">${escapeHtml(trip.tipo || 'Standard')}</div>
              <div style="font-size: 11px; color: var(--text-secondary);">Servicio</div>
            </div>
          </div>
        </div>
      `;
      
      modal.classList.add('active');
      Sound.play('new');
      Sound.vibrate([100, 50, 100, 50, 200]);
      
      // Timer
      let seg = 30;
      const bar = document.getElementById('timerProgress');
      const txt = document.getElementById('timerText');
      
      clearInterval(timerInterval);
      bar.style.width = '100%';
      setTimeout(() => bar.style.width = '0%', 50);
      
      timerInterval = setInterval(() => {
        seg--;
        txt.textContent = seg;
        if (seg <= 0) {
          clearInterval(timerInterval);
          timeoutTrip();
        }
      }, 1000);
    }

    async function acceptTrip() {
      if (!pendingTrip) return;
      clearInterval(timerInterval);
      
      try {
        await supabaseRest.update('viajes', pendingTrip.id, {
          estado: 'ACEPTADO',
          chofer_id: getDriverId(),
          aceptado_at: new Date().toISOString()
        });
        
        Sound.play('success');
        closeModal();
        showToast('✓ Viaje aceptado', 'success');
        loadTrips();
      } catch (err) {
        showToast('Error al aceptar', 'error');
      }
    }

    async function rejectTrip() {
      if (!pendingTrip) return;
      clearInterval(timerInterval);
      
      try {
        await supabaseRest.update('viajes', pendingTrip.id, {
          estado: 'DISPONIBLE',
          chofer_id: null,
          rechazado_por: getDriverId()
        });
        
        closeModal();
        showToast('Viaje rechazado', 'warning');
        loadTrips();
      } catch (err) {
        showToast('Error al rechazar', 'error');
      }
    }

    function timeoutTrip() {
      rejectTrip();
      showToast('⏰ Tiempo agotado', 'warning');
    }

    function closeModal() {
      document.getElementById('incomingModal').classList.remove('active');
      pendingTrip = null;
    }

    // ==========================================
    // ACTIONS
    // ==========================================
    async function acceptTripId(id) {
      try {
        await supabaseRest.update('viajes', id, {
          estado: 'ACEPTADO',
          chofer_id: getDriverId(),
          aceptado_at: new Date().toISOString()
        });
        Sound.play('success');
        showToast('Viaje aceptado', 'success');
        loadTrips();
      } catch (err) {
        showToast('Error', 'error');
      }
    }

    async function rejectTripId(id) {
      if (!confirm('¿Rechazar este viaje?')) return;
      try {
        await supabaseRest.update('viajes', id, {
          estado: 'DISPONIBLE',
          chofer_id: null,
          rechazado_por: getDriverId()
        });
        showToast('Viaje rechazado', 'warning');
        loadTrips();
      } catch (err) {
        showToast('Error', 'error');
      }
    }

    async function startTrip(id) {
      try {
        await supabaseRest.update('viajes', id, { estado: 'EN_CURSO' });
        Sound.play('success');
        showToast('Viaje iniciado', 'success');
        loadTrips();
      } catch (err) {
        showToast('Error', 'error');
      }
    }

    async function finishTrip(id) {
      const notas = prompt('¿Observaciones? (opcional)');
      try {
        await supabaseRest.update('viajes', id, {
          estado: 'COMPLETADO',
          completado_at: new Date().toISOString(),
          notas: notas || null
        });
        Sound.play('success');
        showToast('Viaje completado', 'success');
        loadTrips();
      } catch (err) {
        showToast('Error', 'error');
      }
    }

    function openMaps(origen, destino) {
      window.open(`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origen)}&destination=${encodeURIComponent(destino)}`, '_blank');
    }

    // ==========================================
    // INIT
    // ==========================================
    document.addEventListener('DOMContentLoaded', async () => {
      // Auth check
      if (localStorage.getItem('choferLogueado') !== 'true') {
        location.href = 'login-chofer.html';
        return;
      }

      if (!initSupabase()) {
        showToast('Error de conexión', 'error');
        return;
      }

      await loadTrips();
      
      // Realtime
      supabaseClient.channel('trips')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'viajes' }, () => {
          setTimeout(loadTrips, 500);
        })
        .subscribe();

      // User interaction for sound
      document.body.addEventListener('click', () => {
        userInteracted = true;
        if (!Sound.ctx) Sound.init();
      }, { once: true });

      // Refresh countdowns
      setInterval(() => {
        if (!document.hidden) renderTrips();
      }, 1000);
    });
  </script>
</body>
</html>
