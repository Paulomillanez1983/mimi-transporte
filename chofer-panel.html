<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>MIMI Driver</title>

  <meta name="description" content="Panel de conductor MIMI - Transporte seguro" />

  <meta property="og:title" content="MIMI Driver" />
  <meta property="og:description" content="Panel de conductor MIMI" />
  <meta property="og:type" content="website" />

  <link rel="icon" href="./favicon.ico" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" />
  <link rel="manifest" href="./manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./libs/maplibre-gl.css" />

  <script src="./libs/supabase-js.js" defer></script>
  <script src="./libs/maplibre-gl.js" defer></script>

  <link rel="stylesheet" href="css/design-system.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/panel.css" />

  <style>
    html { -webkit-text-size-adjust: 100%; }
  </style>
</head>

<body>

  <div id="map-container"></div>

  <div id="ui-layer">

    <header class="header" id="header">
      <div class="header-content">
        <div class="driver-profile">
          <div class="avatar">
            <span id="driver-initial">M</span>
            <div class="status-dot" id="status-dot"></div>
          </div>
          <div class="driver-info">
            <h1 id="driver-name">Conductor</h1>
            <span class="status-text" id="status-text">Desconectado</span>
          </div>
        </div>

        <button class="icon-btn" id="menu-btn" aria-label="Menú">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="stats-floating" id="stats-panel">
      <div class="stat-card">
        <span class="stat-value" id="stat-earnings">$0</span>
        <span class="stat-label">Hoy</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-trips">0</span>
        <span class="stat-label">Viajes</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-rating">5.0</span>
        <span class="stat-label">Rating</span>
      </div>
    </div>

    <div class="nav-bar" id="nav-bar">
      <div class="nav-content">
        <div class="nav-maneuver">
          <div class="maneuver-icon" id="maneuver-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
              <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="nav-text">
            <div class="nav-street" id="nav-street">Esperando...</div>
            <div class="nav-next" id="nav-next">Conectate para recibir viajes</div>
          </div>
        </div>

        <div class="nav-distance" id="nav-distance">--</div>
      </div>

      <div class="nav-progress">
        <div class="nav-progress-bar" id="nav-progress-bar"></div>
      </div>
    </div>

    <button class="fab-online" id="fab-online">
      <div class="fab-content">
        <span class="fab-icon">🔴</span>
        <span class="fab-text">CONECTAR</span>
      </div>
      <div class="fab-pulse"></div>
    </button>

    <div class="bottom-sheet" id="bottom-sheet">
      <div class="sheet-handle">
        <div class="handle-bar"></div>
      </div>

      <div class="sheet-content" id="sheet-content">
        <div class="waiting-state">
          <div class="pulse-ring"></div>
          <h3>Estás desconectado</h3>
          <p>Toca "CONECTAR" para recibir viajes</p>
        </div>
      </div>
    </div>

    <div class="incoming-modal" id="incoming-modal">
      <div class="modal-backdrop"></div>

      <div class="modal-content">
        <div class="countdown-ring">
          <svg class="countdown-svg" viewBox="0 0 100 100">
            <defs>
              <linearGradient id="countdown-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#05944F"/>
                <stop offset="100%" style="stop-color:#276EF1"/>
              </linearGradient>
            </defs>

            <circle class="countdown-bg" cx="50" cy="50" r="45"/>
            <circle class="countdown-progress" id="countdown-circle" cx="50" cy="50" r="45"/>
          </svg>

          <span class="countdown-number" id="countdown-number">15</span>
        </div>

        <div class="trip-preview">
          <div class="route-visual">
            <div class="route-dot pickup"></div>
            <div class="route-line"></div>
            <div class="route-dot dropoff"></div>
          </div>

          <div class="route-info">
            <div class="location pickup">
              <span class="location-name" id="trip-pickup">--</span>
              <span class="location-time" id="pickup-time">-- min</span>
            </div>

            <div class="location dropoff">
              <span class="location-name" id="trip-dropoff">--</span>
              <span class="location-distance" id="trip-distance">-- km</span>
            </div>
          </div>
        </div>

        <div class="trip-metrics">
          <div class="metric">
            <span class="metric-value" id="trip-price">$--</span>
            <span class="metric-label">Ganancia</span>
          </div>

          <div class="metric">
            <span class="metric-value" id="trip-duration">-- min</span>
            <span class="metric-label">Duración</span>
          </div>
        </div>

        <div class="trip-client" id="client-info">
          <div class="client-avatar">👤</div>

          <div class="client-details">
            <span class="client-name" id="client-name">--</span>
            <span class="client-phone" id="client-phone">--</span>
          </div>

          <div class="client-actions">
            <button class="action-btn call" id="btn-call" aria-label="Llamar"></button>
            <button class="action-btn whatsapp" id="btn-whatsapp" aria-label="WhatsApp"></button>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn-reject" id="btn-reject">
            <span>✕</span>
            <small>Rechazar</small>
          </button>

          <button class="btn-accept" id="btn-accept">
            <span>✓</span>
            <small>Aceptar</small>
          </button>
        </div>
      </div>
    </div>

    <div class="arrival-panel" id="arrival-panel">
      <div class="arrival-content">
        <div class="arrival-icon">🏁</div>
        <h2>¡Has llegado!</h2>
        <p>¿Deseas finalizar el viaje?</p>

        <div class="arrival-actions">
          <button class="btn-secondary" id="btn-continue">Continuar</button>
          <button class="btn-primary" id="btn-finish">Finalizar</button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <div class="global-loading" id="global-loading">
      <div class="spinner"></div>
      <span class="loading-text">Cargando...</span>
    </div>

    <div class="offline-banner" id="offline-banner">
      <span>⚠ Sin conexión</span>
    </div>

  </div>

  <!-- JS Modules -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
