<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <meta
    name="description"
    content="Conducí con confianza, trabajá con tranquilidad. Sumate como chofer de MIMI Transporte Infantil."
  />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="MIMI - Portal Choferes" />
  <meta
    property="og:description"
    content="Conducí con confianza, trabajá con tranquilidad. Viajes programados, traslados escolares y soporte directo."
  />
  <meta
    property="og:image"
    content="https://raw.githubusercontent.com/Paulomillanez1983/mimi-transporte/main/flyer-chofer.png"
  />
  <meta
    property="og:image:secure_url"
    content="https://raw.githubusercontent.com/Paulomillanez1983/mimi-transporte/main/flyer-chofer.png"
  />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="1600" />
  <meta
    property="og:url"
    content="https://paulomillanez1983.github.io/mimi-transporte/chofer.html"
  />
  <meta property="og:site_name" content="MIMI Transporte Infantil" />
  <meta property="og:locale" content="es_AR" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MIMI - Portal Choferes" />
  <meta
    name="twitter:description"
    content="Conducí con confianza, trabajá con tranquilidad."
  />
  <meta
    name="twitter:image"
    content="https://raw.githubusercontent.com/Paulomillanez1983/mimi-transporte/main/flyer-chofer.png"
  />

  <meta name="theme-color" content="#1a1a2e" />

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/jpeg"
    href="https://raw.githubusercontent.com/Paulomillanez1983/mimi-transporte/main/flyer-chofer.png"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .logo-mini {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 1.5rem;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    .hero-image {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    .cta-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(26, 26, 46, 0.97), rgba(26, 26, 46, 0.2), transparent);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 20;
    }

    .btn-ingresar {
      background: linear-gradient(135deg, #ff9800, #f57c00);
      color: white;
      border: none;
      padding: 18px 32px;
      border-radius: 30px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
      transition: all 0.25s ease;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .btn-ingresar:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 152, 0, 0.5);
    }

    .btn-ingresar:active {
      transform: translateY(0);
    }

    .btn-secundario {
      background: transparent;
      color: rgba(255, 255, 255, 0.82);
      border: 2px solid rgba(255, 255, 255, 0.28);
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-secundario:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    @media (max-width: 480px) {
      .btn-ingresar {
        font-size: 1rem;
        padding: 16px 24px;
      }

      .btn-secundario {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="logo-mini">🚐 MIMI</div>

  <!-- Imagen promocional -->
  <img
    src="https://raw.githubusercontent.com/Paulomillanez1983/mimi-transporte/main/flyer-chofer.png"
    alt="Sumate como chofer MIMI"
    class="hero-image"
    onerror="this.src='https://placehold.co/1080x1920/1a1a2e/ffffff?text=MIMI+Transporte+Infantil'"
  />

  <div class="cta-container">
    <button class="btn-ingresar" onclick="ingresarPanel()">
      🚀 Ingresar al Panel
    </button>

    <button class="btn-secundario" onclick="contactar()">
      📞 Quiero ser chofer
    </button>
  </div>

<script>
  function ingresarPanel() {
    window.location.href = 'login-chofer.html';
  }

  function contactar() {
    window.open(
      'https://wa.me/5493517014863?text=Hola!%20Quiero%20sumarme%20como%20chofer%20MIMI',
      '_blank'
    );
  }
</script>
</body>
</html>
