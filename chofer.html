<script>
  const SUPABASE_URL = "https://xrphpqmutvadjrucqicn.supabase.co";
  const SUPABASE_KEY = "sb_publishable_ZoEziWmg0PUy2lNVsiw1XA_zO40DAoq";
  
  window.supabase = {
    from: (table) => ({
      select: async (columns = '*') => {
        try {
          const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${columns}&order=created_at.desc`, {
            method: 'GET',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`
            }
          });
          const result = await response.json();
          return { data: result, error: null };
        } catch (err) {
          return { data: null, error: { message: err.message } };
        }
      },
      
      update: async (data) => {
        try {
          const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${data.id}`, {
            method: 'PATCH',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation'
            },
            body: JSON.stringify(data)
          });
          const result = await response.json();
          return { data: result, error: null };
        } catch (err) {
          return { data: null, error: { message: err.message } };
        }
      }
    })
  };
</script>

<script>
// ==================== SISTEMA DE SONIDOS TIPO UBER ====================

const SoundSystem = {
  audioContext: null,
  enabled: false,
  lastTripCount: 0,
  
  // Inicializar el sistema de audio (requiere interacción del usuario)
  init() {
    if (!this.audioContext) {
      this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    this.enabled = true;
    this.updateButton();
  },
  
  // Alternar sonido on/off
  toggle() {
    if (!this.audioContext) {
      this.init();
    }
    this.enabled = !this.enabled;
    this.updateButton();
    return this.enabled;
  },
  
  updateButton() {
    const btn = document.getElementById('soundBtn');
    if (btn) {
      btn.textContent = this.enabled ? '🔔' : '🔕';
      btn.classList.toggle('muted', !this.enabled);
      btn.title = this.enabled ? 'Sonido activado' : 'Sonido desactivado';
    }
  },
  
  // Sonido de nuevo viaje (tipo Uber - ding suave)
  playNewTrip() {
    if (!this.enabled || !this.audioContext) return;
    
    const ctx = this.audioContext;
    const now = ctx.currentTime;
    
    // Crear oscilador para el "ding"
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    // Frecuencia tipo campana (A5)
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(440, now + 0.3);
    
    // Envolvente suave
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    
    osc.start(now);
    osc.stop(now + 0.4);
    
    // Segunda nota para efecto "ding-dong" suave
    setTimeout(() => {
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      
      osc2.frequency.setValueAtTime(698.46, ctx.currentTime); // F5
      osc2.frequency.exponentialRampToValueAtTime(349.23, ctx.currentTime + 0.4);
      
      gain2.gain.setValueAtTime(0, ctx.currentTime);
      gain2.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.05);
      gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      
      osc2.start(ctx.currentTime);
      osc2.stop(ctx.currentTime + 0.5);
    }, 150);
  },
  
  // Sonido de éxito (acción completada)
  playSuccess() {
    if (!this.enabled || !this.audioContext) return;
    
    const ctx = this.audioContext;
    const now = ctx.currentTime;
    
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    // Escala ascendente tipo "check"
    osc.frequency.setValueAtTime(523.25, now); // C5
    osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
    osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
    
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.4);
    
    osc.start(now);
    osc.stop(now + 0.4);
  },
  
  // Sonido de notificación suave
  playNotification() {
    if (!this.enabled || !this.audioContext) return;
    
    const ctx = this.audioContext;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.2);
    
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
    
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.2);
  },
  
  // Vibración del dispositivo (si está disponible)
  vibrate(pattern = [50, 100, 50]) {
    if (navigator.vibrate) {
      navigator.vibrate(pattern);
    }
  }
};

// Función global para alternar sonido
function toggleSound() {
  const isEnabled = SoundSystem.toggle();
  if (isEnabled) {
    SoundSystem.playNotification(); // Feedback inmediato
  }
}

function normalizarEstado(estado) {
  return String(estado || '')
    .replace(/-/g, '_')
    .toUpperCase()
    .trim();
}


    let viajesData = [];
    let filtroActual = 'todos';

    // Cargar al iniciar
    document.addEventListener('DOMContentLoaded', () => {
      cargarViajes();
      
      // Intentar inicializar audio en la primera interacción
      document.body.addEventListener('click', () => {
        if (!SoundSystem.audioContext) {
          SoundSystem.init();
        }
      }, { once: true });
    });

    // Auto-refresh cada 30 segundos
    setInterval(cargarViajes, 30000);
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz2lTCqddKIczcr8Sv2vU8dmfUeauueivjG9B4O7iRSmSsHixRegbEZD1fm1AtNcA7E/exec';

async function cargarViajes() {
  const btn = document.getElementById('btnRefresh');
  if (btn) btn.classList.add('spinning');

  try {
    console.log("📡 Cargando viajes desde Supabase...");
    
    const { data, error } = await supabase.from('viajes').select('*');
    
    if (error) {
      throw new Error(error.message);
    }

    const newData = data || [];
    
    // Detectar nuevos viajes pendientes
    const oldPendingCount = viajesData.filter(v => normalizarEstado(v.estado) === 'PENDIENTE').length;
    const newPendingCount = newData.filter(v => normalizarEstado(v.estado) === 'PENDIENTE').length;
    
    // Si hay más pendientes que antes, es un nuevo viaje
    if (newPendingCount > oldPendingCount && viajesData.length > 0) {
      SoundSystem.playNewTrip();
      SoundSystem.vibrate([100, 50, 100, 50, 200]);
      showNewTripIndicator();
    }
    
    viajesData = newData;
    console.log(`✅ ${viajesData.length} viajes cargados`);

    renderizarViajes();
    actualizarStats();

  } catch (error) {
    console.error('Error cargando viajes:', error);
    document.getElementById('listaViajes').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <p>Error al cargar: ${error.message}</p>
        <button onclick="cargarViajes()" style="margin-top:10px;padding:8px 16px;">Reintentar</button>
      </div>
    `;
  } finally {
    if (btn) btn.classList.remove('spinning');
  }
}

// Mostrar indicador visual de nuevo viaje
function showNewTripIndicator() {
  const indicator = document.getElementById('newTripIndicator');
  if (indicator) {
    indicator.classList.add('show');
    setTimeout(() => {
      indicator.classList.remove('show');
    }, 4000);
  }
}
  function actualizarStats() {
      const hoy = new Date().toDateString();
      const pendientes = viajesData.filter(v => normalizarEstado(v.estado) === 'PENDIENTE').length;
      
      const deHoy = viajesData.filter(v => {
        const fecha = v.fecha || v.fechaHora;
        if (!fecha) return false;
        return new Date(fecha).toDateString() === hoy;
      }).length;

      document.getElementById('statPendientes').textContent = pendientes;
      document.getElementById('statHoy').textContent = deHoy;
      document.getElementById('statTotal').textContent = viajesData.length;
    }

    function filtrar(estado) {
      filtroActual = estado;
      
      // Actualizar botones activos usando data-filtro
      document.querySelectorAll('.filtro-btn').forEach(btn => {
        btn.classList.remove('activo');
        if (btn.getAttribute('data-filtro') === estado) {
          btn.classList.add('activo');
        }
      });
      
      renderizarViajes();
    }

    function renderizarViajes() {
      const container = document.getElementById('listaViajes');
      let viajes = viajesData;

      if (filtroActual !== 'todos') {
        // Mapear filtros a estados normalizados
        const filtroMap = {
          'pendiente': 'PENDIENTE',
          'aceptado': 'ACEPTADO',
          'en-camino': 'EN_CURSO',
          'completado': 'COMPLETADO',
          'cancelado': 'CANCELADO'
        };
        
        const estadoBuscado = filtroMap[filtroActual] || filtroActual.toUpperCase();
        
        viajes = viajes.filter(v => {
          const estadoNormalizado = normalizarEstado(v.estado);
          return estadoNormalizado === estadoBuscado;
        });
      }

      // Ordenar: pendientes primero, luego por fecha
      viajes.sort((a, b) => {
        const orden = { 'PENDIENTE': 0, 'ACEPTADO': 1, 'EN_CURSO': 2, 'COMPLETADO': 3, 'CANCELADO': 4 };
        const estadoA = normalizarEstado(a.estado);
        const estadoB = normalizarEstado(b.estado);
        if (orden[estadoA] !== orden[estadoB]) return orden[estadoA] - orden[estadoB];
        return new Date(a.fecha || a.fechaHora || 0) - new Date(b.fecha || b.fechaHora || 0);
      });

      if (viajes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🚗</div>
            <p>No hay viajes ${filtroActual !== 'todos' ? 'en este estado' : ''}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = viajes.map(v => crearCardViaje(v)).join('');
    }

    function crearCardViaje(v) {
      const estado = normalizarEstado(v.estado || 'PENDIENTE');
      const estadoClass = estado.toLowerCase().replace(/_/g, '-');
      const fecha = new Date(v.fecha || v.fechaHora || Date.now());
      const fechaStr = fecha.toLocaleDateString('es-AR', {
        weekday: 'short',
        day: 'numeric',
        month: 'short',
        hour: '2-digit',
        minute: '2-digit'
      });

      const inicial = v.cliente ? v.cliente.charAt(0).toUpperCase() : '?';

      let acciones = '';
      if (estado === 'PENDIENTE') {
        acciones = `
          <button class="btn-accion btn-aceptar" onclick="cambiarEstado('${v.id}', 'ACEPTADO')">✓ Aceptar</button>
          <button class="btn-accion btn-maps" onclick="abrirMaps('${v.origen}', '${v.destino}')">🗺️ Maps</button>
        `;
      } else if (estado === 'ACEPTADO') {
        acciones = `
          <button class="btn-accion btn-iniciar" onclick="cambiarEstado('${v.id}', 'EN_CURSO')">🚀 Iniciar</button>
          <a href="tel:${v.telefono}" class="btn-accion btn-llamar" style="text-decoration:none;">📞 Llamar</a>
        `;
      } else if (estado === 'EN_CURSO') {
        acciones = `
          <button class="btn-accion btn-finalizar" onclick="finalizarViaje('${v.id}')">✅ Finalizar</button>
          <a href="https://wa.me/${v.telefono}" target="_blank" class="btn-accion btn-whatsapp" style="text-decoration:none;">💬 WA</a>
        `;
      } else {
        acciones = `
          <button class="btn-accion btn-maps" onclick="abrirMaps('${v.origen}', '${v.destino}')">🗺️ Ver ruta</button>
        `;
      }

      return `
        <div class="viaje-card ${estadoClass}">
          <div class="viaje-header">
            <span class="viaje-fecha">${fechaStr}</span>
            <span class="viaje-estado estado-${estadoClass}">${estado.replace('_', ' ')}</span>
          </div>
         
          <div class="viaje-cliente">
            <div class="cliente-avatar">${inicial}</div>
            <div class="cliente-datos">
              <div class="cliente-nombre">${v.cliente || 'Sin nombre'}</div>
              <div class="cliente-tel">📱 ${v.telefono || 'Sin teléfono'}</div>
            </div>
          </div>
         
          <div class="viaje-ruta">
            <div class="ruta-item">
              <div class="ruta-icon origen">📍</div>
              <div class="ruta-text">${v.origen || ''}</div>
            </div>
            <div class="ruta-item">
              <div class="ruta-icon destino">🎯</div>
              <div class="ruta-text">${v.destino || ''}</div>
            </div>
          </div>
         
          <div class="viaje-info">
            <div class="info-item">
              <div class="info-valor">$${Number(v.precio || 0).toLocaleString()}</div>
              <div class="info-label">Precio</div>
            </div>
            <div class="info-item">
              <div class="info-valor">${v.km || 0}km</div>
              <div class="info-label">Distancia</div>
            </div>
            <div class="info-item">
              <div class="info-valor">${v.tipo || 'N/D'}</div>
              <div class="info-label">Servicio</div>
            </div>
          </div>
         
          ${v.notas ? `<div style="font-size:0.85rem;color:#666;margin-bottom:10px;padding:8px;background:#fffde7;border-radius:6px;">📝 ${v.notas}</div>` : ''}
         
          <div class="viaje-acciones">
            ${acciones}
          </div>
        </div>
      `;
    }

async function cambiarEstado(id, nuevoEstado) {
  if (!id) return alert('ID inválido');

  try {
    const { data, error } = await supabase.from('viajes').update({
      id: id,
      estado: nuevoEstado
    });

    if (error) {
      alert('Error: ' + error.message);
      return;
    }

    SoundSystem.playSuccess(); // Sonido de éxito
    mostrarNotificacion('Estado actualizado', 'success');
    cargarViajes();
    
  } catch (err) {
    alert('Error de conexión');
    console.error(err);
  }
}

async function finalizarViaje(id) {
  const notas = prompt('¿Observaciones?');

  try {
    const { data, error } = await supabase.from('viajes').update({
      id: id,
      estado: 'COMPLETADO',
      notas: notas || null
    });

    if (error) {
      alert('Error al finalizar');
      return;
    }

    SoundSystem.playSuccess(); // Sonido de éxito
    mostrarNotificacion('Viaje finalizado', 'success');
    cargarViajes();
    
  } catch (err) {
    alert('Error de conexión');
  }
}

    function abrirMaps(origen, destino) {
      const url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origen)}&destination=${encodeURIComponent(destino)}`;
      window.open(url, '_blank');
    }

    function mostrarNotificacion(mensaje, tipo) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        background: ${tipo === 'success' ? '#4caf50' : '#2196f3'}; color: white;
        padding: 12px 24px; border-radius: 25px; font-weight: 600; z-index: 10000;
      `;
      toast.textContent = mensaje;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
