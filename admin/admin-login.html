<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>MIMI Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="color-scheme" content="dark" />

  <link rel="icon" href="../assets/icons/logo-mimi.png" type="image/png" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body class="centered">
  <div class="admin-login-shell">
    <div class="admin-login-bg"></div>

    <div class="card admin-login-card">
      <div class="logo-wrap">
        <img
          src="../assets/icons/logo-mimi.png"
          class="logo"
          alt="MIMI Admin"
          loading="eager"
          decoding="async"
        />
      </div>

      <div class="admin-login-copy">
        <span class="eyebrow">MIMI ADMIN</span>
        <h1>Panel Admin</h1>
        <p class="login-subtitle">
          Acceso seguro para administradores autorizados
        </p>
      </div>

      <button id="loginGoogle" class="login-google-btn" type="button">
        <span class="login-google-btn__text">Ingresar con Google</span>
      </button>

      <div id="loading" class="login-loading hidden" aria-live="polite">
        Verificando acceso...
      </div>

      <p id="error" class="login-error" aria-live="polite"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./admin-login.js"></script>
</body>
</html>
