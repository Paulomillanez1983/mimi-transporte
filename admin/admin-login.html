<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>MIMI Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="centered">

  <div class="card">
    <img src="../assets/icons/logo-mimi.png" class="logo" />
    <h1>Panel Admin</h1>
    <button id="loginGoogle">Ingresar con Google</button>
    <p id="error"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabase = window.supabase.createClient(
      "https://xrphpqmutvadjrucqicn.supabase.co",
      "TU_ANON_KEY"
    );

    document.getElementById("loginGoogle").onclick = async () => {
      await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: location.origin + "/admin/admin-dashboard.html"
        }
      });
    };

    (async () => {
      const { data } = await supabase.auth.getSession();
      if (!data.session) return;

      const user = data.session.user;

      const { data: admin } = await supabase
        .from("admin_users")
        .select("*")
        .eq("user_id", user.id)
        .eq("active", true)
        .maybeSingle();

      if (admin) {
        window.location.href = "admin-dashboard.html";
      } else {
        document.getElementById("error").innerText =
          "No autorizado como administrador";
      }
    })();
  </script>
</body>
</html>
