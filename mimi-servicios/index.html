<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#163867">
  <meta name="description" content="MIMI Servicios. Redirección automática según el rol del usuario autenticado.">
  <title>MIMI Servicios</title>
  <style>
    :root {
      --bg: #edf4ff;
      --surface: rgba(255, 255, 255, 0.92);
      --text: #13233f;
      --muted: #5e6f8f;
      --primary: #1e3c72;
      --primary-2: #2f5b9f;
      --shadow: 0 20px 50px rgba(17, 41, 86, 0.12);
      --radius: 24px;
      --font-display: "Nunito", sans-serif;
      --font-body: "DM Sans", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding:
        max(20px, env(safe-area-inset-top))
        16px
        max(20px, env(safe-area-inset-bottom))
        16px;
      font-family: var(--font-body);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(91, 156, 255, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(43, 182, 115, 0.12), transparent 20%),
        linear-gradient(180deg, #f6f9ff 0%, #edf4ff 42%, #e7eefc 100%);
    }

    .boot-card {
      width: min(460px, 100%);
      padding: 28px 24px;
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      color: var(--primary);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 18px;
      border-radius: 999px;
      border: 4px solid rgba(30, 60, 114, 0.12);
      border-top-color: var(--primary-2);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="boot-card" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <h1>Abriendo MIMI Servicios</h1>
    <p>Estamos validando tu sesión y redirigiéndote a la experiencia correcta.</p>
    <noscript>
      <p style="margin-top: 12px;">Necesitás habilitar JavaScript para continuar.</p>
    </noscript>
  </main>

  <script src="./env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (async () => {
      try {
        const url = window.MIMI_SERVICES_ENV?.SUPABASE_URL;
        const key = window.MIMI_SERVICES_ENV?.SUPABASE_ANON_KEY;

        if (!url || !key || !window.supabase?.createClient) {
          window.location.replace("./cliente.html");
          return;
        }

        const client = window.supabase.createClient(url, key, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
          },
        });

        const { data, error } = await client.auth.getSession();
if (error) {
  console.warn("Error sesión, limpiando...", error);

  try {
    await client.auth.signOut();
  } catch {}

  localStorage.clear();
  window.location.replace("./cliente.html");
  return;
}
        const session = data?.session ?? null;
        if (!session?.user?.id) {
          window.location.replace("./cliente.html");
          return;
        }

        const { data: providers, error: providerError } = await client
          .from("svc_providers")
          .select("id")
          .eq("user_id", session.user.id)
          .limit(1);

        if (!providerError && Array.isArray(providers) && providers.length > 0) {
          window.location.replace("./prestador.html");
          return;
        }

        window.location.replace("./cliente.html");
      } catch {
        window.location.replace("./cliente.html");
      }
    })();
  </script>
</body>
</html>
